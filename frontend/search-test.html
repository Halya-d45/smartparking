<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Search Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { padding: 20px; }
        #map { height: 400px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Location Search Test</h1>

    <div class="search-engine" style="margin-bottom: 20px;">
        <i class="fas fa-search"></i>
        <input type="text" id="placeSearch" placeholder="Search location (e.g. Vijayawada, Hyderabad)" onkeypress="handleSearchKeyPress(event)">
        <button class="btn-premium btn-glow" onclick="searchPlace()">Search</button>
    </div>

    <div id="map"></div>

    <div id="parkingList" class="parking-list-optimized">
        <div class="empty-state-v2">
            <i class="fas fa-search-location"></i>
            <p>Search for a location to find parking spots.</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Initialize map for testing
        initMap();
    </script>
</body>
</html>
