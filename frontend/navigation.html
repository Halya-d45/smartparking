<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation - SmartPark Premium</title>

    <!-- Global Styles & Fonts -->
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            background: var(--bg-deep);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* High-tech Map Background */
        .map-canvas {
            flex: 1;
            background: radial-gradient(circle at center, #1a2a4a 0%, #0b101a 100%);
            position: relative;
            background-image: 
                linear-gradient(rgba(45, 99, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 99, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .nav-instruction-card {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--primary);
            animation: fadeInDown 0.6s ease-out;
        }

        .instruction-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .turn-icon {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            box-shadow: 0 0 15px rgba(45, 99, 255, 0.4);
        }

        .distance-badge {
            text-align: right;
        }

        .distance-badge h2 {
            font-size: 32px;
            color: var(--accent);
            line-height: 1;
        }

        .distance-badge span {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .user-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .marker-pulse {
            width: 40px;
            height: 40px;
            background: rgba(45, 99, 255, 0.2);
            border-radius: 50%;
            position: absolute;
            animation: pulse-marker 2s infinite;
        }

        .marker-core {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            border: 3px solid white;
            position: relative;
            z-index: 2;
        }

        .bottom-panel {
            background: var(--bg-main);
            border-top: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 30px 30px 0 0;
            z-index: 10;
        }

        .nav-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-box label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 5px;
        }

        .stat-box span {
            font-size: 18px;
            font-weight: 700;
        }

        @keyframes pulse-marker {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .controls {
            position: absolute;
            right: 20px;
            top: 130px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
        }

        .control-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="map-canvas">
        <!-- Instruction Card -->
        <div class="card nav-instruction-card">
            <div class="instruction-main">
                <div class="turn-icon">
                    <i class='bx bx-redo'></i>
                </div>
                <div>
                    <h2 id="direction-text">Turn Right</h2>
                    <p id="sub-instruction" style="color: var(--text-dim); font-size: 14px; margin: 0;">Entrance to Row B</p>
                </div>
            </div>
            <div class="distance-badge">
                <h2 id="distance-val">150</h2>
                <span>FT</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="control-btn" onclick="centerMap()"><i class='bx bx-target-lock' style="font-size: 24px;"></i></div>
            <div class="control-btn" onclick="toggleMute()"><i class='bx bx-volume-full' id="volume-icon" style="font-size: 24px;"></i></div>
        </div>

        <!-- User Marker -->
        <div class="user-marker">
            <div class="marker-pulse"></div>
            <div class="marker-core"></div>
        </div>
    </div>

    <!-- Bottom Panel -->
    <div class="bottom-panel">
        <div class="nav-stats">
            <div class="stat-box">
                <label>Arrival</label>
                <span id="eta">14:35</span>
            </div>
            <div class="stat-box">
                <label>Time</label>
                <span id="time-left">3 min</span>
            </div>
            <div class="stat-box">
                <label>Target Slot</label>
                <span id="target-slot" style="color: var(--primary);">B-08</span>
            </div>
        </div>

        <div style="display: flex; gap: 15px;">
            <button class="btn btn-secondary w-100" style="padding: 16px;" onclick="exitNav()">Exit</button>
            <button class="btn btn-primary w-100" style="padding: 16px;" onclick="finishTrip()">Finish Trip</button>
        </div>
    </div>

    <script>
        function centerMap() {
            console.log("Re-centering map...");
        }

        let muted = false;
        function toggleMute() {
            muted = !muted;
            const icon = document.getElementById('volume-icon');
            icon.className = muted ? 'bx bx-volume-mute' : 'bx bx-volume-full';
        }

        function exitNav() {
            if (confirm("Stop navigation and return to dashboard?")) {
                window.location.href = "dashboard.html";
            }
        }

        function finishTrip() {
            alert("Reservation Completed Successfully!");
            window.location.href = "bookings.html";
        }

        // Simulating data updates
        setInterval(() => {
            const dist = document.getElementById('distance-val');
            let current = parseInt(dist.innerText);
            if (current > 10) {
                dist.innerText = current - 1;
            }
        }, 1000);
    </script>

</body>
</html>
