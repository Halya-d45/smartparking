<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Smart Parking - Premium Access</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/premium.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#f9f7f2",
                        primary: "#3b82f6",
                    }
                }
            }
        }
    </script>
    <script>
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api' 
            : 'https://backend-api-uhdp.onrender.com/api';

        document.querySelector('button.bg-slate-900').addEventListener('click', async () => {
            const name = document.querySelector('input[placeholder="John Doe"]').value;
            const email = document.querySelector('input[placeholder="mike@example.com"]').value;
            const password = document.querySelector('input[placeholder="••••••••"]').value;
            const btn = document.querySelector('button.bg-slate-900');

            if (!name || !email || !password) {
                alert('Please fill in all fields');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Creating Account...';

            try {
                const res = await fetch(`${API_BASE}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user_name', data.user.name);
                    alert('Account created successfully!');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'Signup failed');
                }
            } catch (err) {
                console.error(err);
                alert('Server connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sign Up Now <i class="fas fa-arrow-right"></i>';
            }
        });
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[480px] animate-fade-in">
        <!-- Logo Section -->
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-600/20 mx-auto mb-6">
                <i class="fas fa-parking text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter mb-2">Create Account</h1>
            <p class="text-gray-500 font-semibold uppercase text-[10px] tracking-[0.2em]">Join the premium parking network</p>
        </div>

        <!-- Auth Card -->
        <div class="bg-white/70 backdrop-blur-3xl border border-black/5 rounded-[3rem] p-10 shadow-2xl shadow-black/5">
            <div class="space-y-6">
                <!-- Name -->
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Full Name</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-user-tag text-sm"></i>
                        </div>
                        <input type="text" id="name" placeholder="John Doe" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Email Address</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-envelope text-sm"></i>
                        </div>
                        <input type="email" id="email" placeholder="mike@example.com" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Secure Password</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-shield-halved text-sm"></i>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Confirm Password</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-check-circle text-sm"></i>
                        </div>
                        <input type="password" id="confirm-password" placeholder="••••••••" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="signup()" class="w-full py-5 bg-slate-900 text-white font-black text-sm rounded-[1.5rem] shadow-xl shadow-slate-900/20 hover:bg-slate-800 transition-all active:scale-95 flex items-center justify-center gap-3 group">
                        Sign Up Now
                        <i class="fas fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </button>
                </div>

                <!-- Alternative -->
                <div class="flex items-center gap-4 py-4">
                    <div class="h-px flex-1 bg-gray-100"></div>
                    <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">or continue with</span>
                    <div class="h-px flex-1 bg-gray-100"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="py-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">
                        <i class="fab fa-google text-red-500"></i>
                        <span class="text-xs font-black text-slate-700">Google</span>
                    </button>
                    <button class="py-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">
                        <i class="fab fa-apple text-slate-900"></i>
                        <span class="text-xs font-black text-slate-700">Apple</span>
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center mt-8 text-gray-400 font-semibold text-sm">
            Already a member? <a href="login.html" class="text-blue-600 font-black hover:underline underline-offset-4">Sign In</a>
        </p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
