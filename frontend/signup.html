<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Smart Parking - Premium Access</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/premium.css">
    
    <!-- 3D Animation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#f9f7f2",
                        primary: "#3b82f6",
                    }
                }
            }
        }
    </script>
    <style>
        #vanta-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
    </style>
<body class="bg-background min-h-screen flex flex-col items-center justify-center p-6 py-12 md:py-20">
    <div id="vanta-canvas"></div>
    <div class="w-full max-w-[480px] animate-fade-in relative z-10">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-600/20 mx-auto mb-4">
                <i class="fas fa-parking text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-1">Create Account</h1>
            <p class="text-gray-500 font-semibold uppercase text-[9px] tracking-[0.2em]">Join the premium parking network</p>
        </div>

        <!-- Auth Card -->
        <div class="bg-white/70 backdrop-blur-3xl border border-black/5 rounded-[3rem] p-8 shadow-2xl shadow-black/5">
            <div class="space-y-4">
                <!-- Name -->
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Full Name</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-user-tag text-sm"></i>
                        </div>
                        <input type="text" id="name" placeholder="John Doe" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-envelope text-sm"></i>
                        </div>
                        <input type="email" id="email" placeholder="mike@example.com" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Secure Password</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-shield-halved text-sm"></i>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
                    <div class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-check-circle text-sm"></i>
                        </div>
                        <input type="password" id="confirm-password" placeholder="••••••••" class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="signup()" class="w-full py-5 bg-slate-900 text-white font-black text-sm rounded-[1.5rem] shadow-xl shadow-slate-900/20 hover:bg-slate-800 transition-all active:scale-95 flex items-center justify-center gap-3 group">
                        Sign Up Now
                        <i class="fas fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </button>
                </div>

                <!-- Alternative -->
                <div class="flex items-center gap-4 py-4">
                    <div class="h-px flex-1 bg-gray-100"></div>
                    <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">or continue with</span>
                    <div class="h-px flex-1 bg-gray-100"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="py-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">
                        <i class="fab fa-google text-red-500"></i>
                        <span class="text-xs font-black text-slate-700">Google</span>
                    </button>
                    <button class="py-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">
                        <i class="fab fa-apple text-slate-900"></i>
                        <span class="text-xs font-black text-slate-700">Apple</span>
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center mt-8 text-gray-400 font-semibold text-sm">
            Already a member? <a href="login.html" class="text-blue-600 font-black hover:underline underline-offset-4">Sign In</a>
        </p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Initialize 3D Background
        VANTA.NET({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x3b82f6,
            backgroundColor: 0xf9f7f2,
            points: 12.00,
            maxDistance: 22.00,
            spacing: 16.00
        });
    </script>
</body>
</html>
