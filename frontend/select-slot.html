<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Slot - SmartPark Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; overflow-x: hidden; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(24px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2) !important;
            border-radius: 40px;
        }

        .slot-box {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            color: #94a3b8;
        }

        .slot-box:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            transform: translateY(-4px);
            color: #3b82f6;
        }

        .slot-selected {
            background: #3b82f6 !important;
            color: white !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }

        .slot-occupied {
            background: rgba(239, 68, 68, 0.05) !important;
            border-color: rgba(239, 68, 68, 0.1) !important;
            color: #ef4444 !important;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body class="text-slate-100">

    <!-- Premium Nav -->
    <nav class="fixed top-0 left-0 right-0 h-24 bg-slate-900/60 backdrop-blur-2xl border-b border-white/5 z-[60] transition-all duration-300">
        <div class="max-w-[1700px] mx-auto h-full px-8 flex items-center justify-between">
            <div class="flex items-center space-x-12">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-600/30">
                        <i class="fas fa-parking text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-white leading-tight">SmartPark</h1>
                        <p class="text-[10px] uppercase tracking-[0.2em] font-extrabold text-blue-500">Premium</p>
                    </div>
                </div>
                <div class="hidden lg:flex items-center space-x-2 bg-white/5 p-1.5 rounded-2xl border border-white/5">
                    <button onclick="location.href='dashboard.html?tab=map-view'" class="px-6 py-3 rounded-xl transition-all hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-map-location-dot"></i> <span class="font-bold text-sm">Explore</span>
                    </button>
                    <button onclick="location.href='dashboard.html?tab=my-bookings'" class="px-6 py-3 rounded-xl transition-all hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-calendar-check"></i> <span class="font-bold text-sm">Bookings</span>
                    </button>
                    <button onclick="location.href='dashboard.html?tab=saved-slots'" class="px-6 py-3 rounded-xl transition-all hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-bookmark"></i> <span class="font-bold text-sm">Saved</span>
                    </button>
                    <button onclick="location.href='wallet.html'" class="px-6 py-3 rounded-xl transition-all hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-wallet"></i> <span class="font-bold text-sm">Wallet</span>
                    </button>
                    <button onclick="location.href='dashboard.html?tab=profile'" class="px-6 py-3 rounded-xl transition-all hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-user-circle"></i> <span class="font-bold text-sm">Profile</span>
                    </button>
                </div>
            </div>
            <button onclick="window.history.back()" class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-white/20 transition-all">Back to Hubs</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto pt-40 px-8 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <!-- Slot Selection Area -->
            <div class="lg:col-span-2 glass-card p-10">
                <header class="mb-10">
                    <h2 class="text-3xl font-black text-white tracking-tighter mb-2" id="hub-name-display">Loading Hub...</h2>
                    <p class="text-gray-400 font-bold" id="hub-location-display">Scanning available spots...</p>
                </header>

                <div class="flex gap-8 mb-10 pb-8 border-b border-white/5">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-slate-700"></div>
                        <span class="text-[10px] font-black uppercase text-gray-500">Available</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-blue-600 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                        <span class="text-[10px] font-black uppercase text-gray-500">Selected</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                        <span class="text-[10px] font-black uppercase text-gray-500">Occupied</span>
                    </div>
                </div>

                <div class="grid grid-cols-4 sm:grid-cols-6 gap-4" id="slots-grid">
                    <!-- Dynamic Slots -->
                </div>
            </div>

            <!-- Summary Area -->
            <div class="lg:col-span-1">
                <div class="glass-card p-10 sticky top-32">
                    <h3 class="text-xl font-black text-white mb-6 uppercase tracking-widest">Summary</h3>
                    <div class="space-y-6 mb-10">
                        <div class="flex justify-between items-center pb-4 border-b border-white/5">
                            <span class="text-xs font-bold text-gray-500 uppercase">Hub Rate</span>
                            <span class="text-sm font-black text-white" id="hub-rate-display">$0.00/hr</span>
                        </div>
                        <div class="flex justify-between items-center pb-4 border-b border-white/5">
                            <span class="text-xs font-bold text-gray-500 uppercase">Selected Slot</span>
                            <span class="text-sm font-black text-blue-500" id="selected-slot-display">None</span>
                        </div>
                        <div class="flex justify-between items-center pt-4">
                            <span class="text-xs font-black text-gray-400 uppercase">Total Amount</span>
                            <span class="text-3xl font-black text-white" id="total-amount-display">$0.00</span>
                        </div>
                    </div>
                    <button onclick="confirmBooking()" class="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-black uppercase text-xs tracking-[0.2em] shadow-2xl shadow-blue-500/30 hover:bg-blue-700 transition-all active:scale-[0.98]">Confirm Booking</button>
                </div>
            </div>

        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hubId = urlParams.get('id');
        let selectedSlot = null;
        let hubData = null;

        async function init() {
            if (!hubId) return;
            try {
                const res = await fetch(`${CONFIG.API_BASE}/parking/${hubId}`);
                hubData = await res.json();
                
                document.getElementById('hub-name-display').innerText = hubData.name;
                document.getElementById('hub-location-display').innerText = hubData.location;
                document.getElementById('hub-rate-display').innerText = `$${hubData.rate.toFixed(2)}/hr`;
                
                const grid = document.getElementById('slots-grid');
                grid.innerHTML = '';
                
                for(let i=1; i<=24; i++){
                    const slotId = `${hubData.name.charAt(0).toUpperCase()}-${i.toString().padStart(2, '0')}`;
                    const isOccupied = Math.random() > 0.8;
                    const slot = document.createElement('div');
                    slot.className = `slot-box ${isOccupied ? 'slot-occupied' : ''}`;
                    slot.innerHTML = `<span class="text-xs font-black">${slotId}</span>`;
                    if(!isOccupied) {
                        slot.onclick = () => selectSlot(slotId, slot);
                    }
                    grid.appendChild(slot);
                }
            } catch(e) { console.error(e); }
        }

        function selectSlot(id, el) {
            document.querySelectorAll('.slot-box').forEach(s => s.classList.remove('slot-selected'));
            el.classList.add('slot-selected');
            selectedSlot = id;
            document.getElementById('selected-slot-display').innerText = id;
            document.getElementById('total-amount-display').innerText = `$${hubData.rate.toFixed(2)}`;
        }

        async function confirmBooking() {
            if(!selectedSlot) return alert("Please select a slot");
            const user = JSON.parse(localStorage.getItem('user'));
            if(!user) return window.location.href = 'login.html';

            const bookingData = {
                userId: user.id || user._id,
                parkingHubId: hubId,
                parkingHubName: hubData.name,
                location: hubData.location,
                slot: selectedSlot,
                duration: 1,
                totalAmount: hubData.rate,
                isPaid: true
            };

            try {
                const res = await fetch(`${CONFIG.API_BASE}/booking/create`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(bookingData)
                });
                if(res.ok) {
                    alert("Reservation Confirmed!");
                    window.location.href = 'dashboard.html?tab=my-bookings';
                }
            } catch(e) { console.error(e); }
        }

        init();
    </script>
</body>
</html>
