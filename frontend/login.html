<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="gradient-bg">

<div class="app-wrapper">
    <div class="auth-visual-bg"></div>
    
    <div class="auth-container animate-fade">
        <div class="glass-card auth-card">
            <div class="logo-section">
                <div class="logo-icon"><i class="fas fa-parking"></i></div>
                <h1 class="gradient-text">Smart Parking</h1>
                <p>Enterprise Slot Management</p>
            </div>

            <div class="form-section">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="premium-input" placeholder="name@company.com">
                    </div>
                </div>

                <div class="form-group">
                    <div class="flex-between">
                        <label>Password</label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="premium-input" placeholder="••••••••">
                    </div>
                </div>

                <button class="btn-premium" style="width: 100%; margin-top: 10px;" onclick="login()">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create one for free</a></p>
            </div>
        </div>
    </div>
</div>

<style>
/* Page Specific Styles */
.app-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.auth-container {
    width: 100%;
    max-width: 440px;
}
.auth-card {
    padding: 40px;
}
.logo-section {
    text-align: center;
    margin-bottom: 32px;
}
.logo-section h1 {
    font-size: 28px;
    margin: 12px 0 4px;
}
.logo-section p {
    color: var(--text-secondary);
    font-size: 14px;
}
.logo-icon {
    width: 54px;
    height: 54px;
    background: var(--accent-blue);
    border-radius: 14px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    box-shadow: 0 10px 20px -5px var(--accent-blue-glow);
}
.auth-footer {
    margin-top: 32px;
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
}
.auth-footer a {
    color: var(--accent-blue);
    font-weight: 600;
}
.forgot-link {
    font-size: 12px;
    color: var(--text-muted) !important;
}
.forgot-link:hover {
    color: var(--accent-blue) !important;
}
</style>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
