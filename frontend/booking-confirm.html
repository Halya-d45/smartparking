<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Smart Parking Premium</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="css/premium.css">
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
    <div class="max-w-5xl w-full flex flex-col md:flex-row gap-12 animate-fade-in">
        <!-- Left: Summary -->
        <div class="flex-1">
            <div class="flex items-center gap-4 mb-10">
                <button onclick="history.back()" class="w-12 h-12 rounded-2xl bg-white border border-black/5 flex items-center justify-center text-slate-400 hover:text-slate-900 transition-all">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">Booking <span class="text-blue-600">Summary</span></h1>
            </div>

            <div class="glass-card !p-10 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/5 rounded-full -mr-16 -mt-16"></div>
                
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-8">Reservation Details</h3>
                
                <div class="space-y-6">
                    <div class="flex justify-between items-end pb-4 border-b border-black/5">
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Parking Hub</p>
                            <h4 class="text-xl font-black text-slate-900" id="res-hub">Premium Hub Alpha</h4>
                        </div>
                        <i class="fas fa-building text-blue-100 text-2xl"></i>
                    </div>

                    <div class="grid grid-cols-2 gap-8 py-4 border-b border-black/5">
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Selected Slot</p>
                            <h4 class="text-lg font-black text-slate-900" id="res-slot">HUB-A24</h4>
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Duration</p>
                            <h4 class="text-lg font-black text-slate-900" id="res-duration">2 Hours</h4>
                        </div>
                    </div>

                    <div class="pt-8">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-bold text-gray-500">Subtotal</span>
                            <span class="text-sm font-black text-slate-900" id="res-subtotal">$14.00</span>
                        </div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-sm font-bold text-gray-500">Service Fee</span>
                            <span class="text-sm font-black text-slate-900">$0.50</span>
                        </div>
                        <div class="flex justify-between items-center pt-6 border-t-2 border-dashed border-black/10">
                            <span class="text-xl font-black text-slate-900">Grand Total</span>
                            <span class="text-3xl font-black text-blue-600" id="res-total">$14.50</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Payment -->
        <div class="w-full md:w-[400px] flex flex-col gap-8">
            <div class="stats-card !p-10 !border-none bg-slate-900">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-8">Choose Payment</h3>
                
                <div class="space-y-4 mb-10">
                    <button class="pay-method active w-full flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-blue-500/50 transition-all text-white">
                        <div class="flex items-center gap-4">
                            <i class="fab fa-apple text-2xl"></i>
                            <span class="text-sm font-bold">Apple Pay</span>
                        </div>
                        <i class="fas fa-check-circle text-blue-500"></i>
                    </button>
                    
                    <button class="pay-method w-full flex items-center justify-between p-4 rounded-2xl bg-transparent border border-white/5 hover:border-white/10 transition-all text-gray-400">
                        <div class="flex items-center gap-4">
                            <i class="fab fa-google-pay text-2xl"></i>
                            <span class="text-sm font-bold">Google Pay</span>
                        </div>
                        <i class="far fa-circle"></i>
                    </button>

                    <button class="pay-method w-full flex items-center justify-between p-4 rounded-2xl bg-transparent border border-white/5 hover:border-white/10 transition-all text-gray-400">
                        <div class="flex items-center gap-4">
                            <i class="fas fa-credit-card"></i>
                            <span class="text-sm font-bold">Credit Card</span>
                        </div>
                        <i class="far fa-circle"></i>
                    </button>
                </div>

                <button id="pay-btn" class="w-full py-5 bg-blue-600 text-white font-black rounded-3xl shadow-2xl shadow-blue-600/20 hover:bg-blue-700 transition-all flex items-center justify-center gap-3 active:scale-95 group">
                    <span id="btn-text">Confirm & Pay</span>
                    <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>

            <div id="success-view" class="hidden glass-card !p-10 border-emerald-100 flex-col items-center text-center">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-3xl mb-6">
                    <i class="fas fa-check"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-900 mb-2">Payment Successful!</h2>
                <p class="text-gray-400 font-bold text-sm mb-8">Scan your entry ticket below</p>
                <div id="qrcode" class="p-4 bg-white rounded-3xl shadow-sm inline-block"></div>
                <button onclick="window.location.href='dashboard.html'" class="w-full mt-8 py-4 bg-slate-900 text-white font-black rounded-2xl text-xs uppercase tracking-widest">Back to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        // Load Details
        const hubName = localStorage.getItem('last_booking_hub') || 'Premium Hub Alpha';
        const price = localStorage.getItem('last_booking_price') || '$5.00';
        
        document.getElementById('res-hub').innerText = hubName;
        document.getElementById('res-subtotal').innerText = price;
        document.getElementById('res-total').innerText = price;

        const payBtn = document.getElementById('pay-btn');
        const btnText = document.getElementById('btn-text');
        const successView = document.getElementById('success-view');

        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api' 
            : 'https://backend-api-uhdp.onrender.com/api';

        payBtn.addEventListener('click', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                alert("Please login to proceed with payment.");
                window.location.href = 'login.html';
                return;
            }

            // Processing...
            payBtn.disabled = true;
            btnText.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Processing...';
            
            try {
                const res = await fetch(`${API_BASE}/booking/create`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ 
                        parkingHubName: hubName,
                        location: 'City Center Hub', // fallback or fetch from LS
                        price: price,
                        date: new Date().toLocaleDateString(),
                        timer: '02:00',
                        status: 'UPCOMING'
                    })
                });

                if (res.ok) {
                    setTimeout(() => {
                        payBtn.parentElement.classList.add('hidden');
                        successView.classList.remove('hidden');
                        successView.classList.add('flex');
                        
                        // Generate QR Code
                        new QRCode(document.getElementById("qrcode"), {
                            text: `BOOKING-${Math.random().toString(36).substr(2, 9).toUpperCase()}`,
                            width: 128,
                            height: 128,
                            colorDark : "#0f172a",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                    }, 1500);
                } else {
                    throw new Error("Booking failed");
                }
            } catch (err) {
                alert("Database Error: " + err.message);
                payBtn.disabled = false;
                btnText.innerText = 'Confirm & Pay';
            }
        });
    </script>
</body>
</html>
