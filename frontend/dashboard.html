<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #map { width: 100%; height: 100%; height: 500px; }
    </style>
</head>
<body class="dashboard-page gradient-bg">

<nav class="navbar glass-card">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-toggle" id="navToggle">
        <i class="fas fa-bars"></i>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="dashboard.html" class="active">Map View</a>
        <a href="bookings.html">My Bookings</a>
        <a href="saved.html">Saved Slots</a>
        <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<script>
    // Navigation Toggle Logic
    const toggleBtn = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    
    if (toggleBtn && navLinks) {
        toggleBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = toggleBtn.querySelector('i');
            if (navLinks.classList.contains('active')) {
                icon.classList.replace('fa-bars', 'fa-times');
            } else {
                icon.classList.replace('fa-times', 'fa-bars');
            }
        });

        // Close menu when clicking a link
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                toggleBtn.querySelector('i').classList.replace('fa-times', 'fa-bars');
            });
        });
    }
</script>

<div class="dashboard-main-v2">
    <header class="top-bar glass-card">
        <div class="search-engine">
            <i class="fas fa-search"></i>
            <input type="text" id="placeSearch" placeholder="Find near location (e.g. London, Chennai)">
            <button class="btn-premium btn-glow" onclick="searchPlace()">Locate Now</button>
        </div>
        <div class="header-stats">
            <div class="mini-stat"><i class="fas fa-bolt color-blue"></i> <span id="activeBookingsCount">0</span> Active</div>
            <div class="mini-stat"><i class="fas fa-bookmark color-cyan"></i> <span id="savedPlacesCount">0</span> Saved</div>
        </div>
    </header>

    <section class="main-workspace">
        <div class="map-container glass-card shadow-premium">
            <div id="map"></div>
        </div>
        
        <div class="results-panel glass-card shadow-premium">
            <div class="panel-header">
                <h3>Nearby Hubs</h3>
                <span class="hub-count" id="hubCount">Scanning...</span>
            </div>
            
            <div class="recent-hubs-container mb-4" id="recentHubs">
                <!-- Data injected via script.js -->
            </div>
            <div id="parkingList" class="parking-list-optimized">
                <div class="empty-state-v2">
                    <i class="fas fa-search-location"></i>
                    <p>Initiate a search to discover<br>premium parking slots.</p>
                </div>
            </div>
        </div>
    </section>
</div>

<script src="https://apis.mappls.com/advancedmaps/api/idmskfmxyctfqzchqalvfjwouxzegyyfrffq/map_sdk?layer=vector&v=3.0"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/script.js"></script>
<script>
    // Set user name and stats from localStorage/API
    const user = JSON.parse(localStorage.getItem("user"));
    const token = localStorage.getItem("token");

    if(!user || !token) {
        window.location.href = "login.html";
    } else {
        const nameLabel = document.getElementById("userNameHeader");
        if(nameLabel) nameLabel.innerText = user.name;
        loadStats();
    }

    async function loadStats() {
        try {
            const token = localStorage.getItem("token");
            const res = await fetch(`${CONFIG.API_BASE}/saved/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stats = await res.json();
            
            // Update the new mini-stats in top-bar
            const bookingsEl = document.getElementById("activeBookingsCount");
            const savedEl = document.getElementById("savedPlacesCount");
            
            if(bookingsEl) bookingsEl.innerText = stats.activeBookings || 0;
            if(savedEl) savedEl.innerText = stats.savedPlaces || 0;
        } catch (err) {
            console.error("Stats Error:", err);
        }
    }
</script>
</body>
</html>
