<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Parking Premium</title>

    <!-- Fonts & Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/premium.css">

    <!-- 3D Animation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#f9f7f2",
                        primary: "#3b82f6",
                    }
                }
            }
        }
    </script>
    <style>
        #vanta-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>

<body class="bg-background min-h-screen flex items-center justify-center p-6 py-12 md:py-20">
    <div id="vanta-canvas"></div>
    <div class="w-full max-w-[460px] animate-fade-in text-center relative z-10">
        <!-- Logo Section -->
        <div class="mb-10">
            <div
                class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-600/20 mx-auto mb-6">
                <i class="fas fa-parking text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter mb-2">Welcome Back</h1>
            <p class="text-gray-500 font-semibold uppercase text-[10px] tracking-[0.2em]">Secure Access to your hub</p>
        </div>

        <!-- Auth Card -->
        <div
            class="bg-white/70 backdrop-blur-3xl border border-black/5 rounded-[3rem] p-10 shadow-2xl shadow-black/5 text-left">
            <div class="space-y-6">
                <!-- Email -->
                <div>
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-1">Email
                        Address</label>
                    <div
                        class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-envelope text-sm"></i>
                        </div>
                        <input type="email" id="email" placeholder="mike@example.com"
                            class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between items-center mb-3 ml-1">
                        <label
                            class="block text-[11px] font-black text-gray-400 uppercase tracking-widest">Password</label>
                        <a href="#" class="text-[10px] font-black text-blue-600 hover:underline">Forgot?</a>
                    </div>
                    <div
                        class="relative flex items-center bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-inner focus-within:border-blue-200 transition-all">
                        <div class="w-12 flex items-center justify-center text-gray-300">
                            <i class="fas fa-shield-halved text-sm"></i>
                        </div>
                        <input type="password" id="password" placeholder="••••••••"
                            class="flex-1 py-4 bg-transparent border-none outline-none font-bold text-slate-800 placeholder:text-gray-300">
                    </div>
                </div>

                <div class="pt-4">
                    <button id="login-btn"
                        class="w-full py-5 bg-blue-600 text-white font-black text-sm rounded-[1.5rem] shadow-xl shadow-blue-600/20 hover:bg-blue-700 transition-all active:scale-95 flex items-center justify-center gap-3 group">
                        Sign In
                        <i class="fas fa-arrow-right transition-transform group-hover:translate-x-1"></i>
                    </button>
                </div>

                <div class="flex items-center gap-4 py-2">
                    <div class="h-px flex-1 bg-gray-100"></div>
                    <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">or</span>
                    <div class="h-px flex-1 bg-gray-100"></div>
                </div>

                <button
                    class="w-full py-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-3 text-slate-700 font-bold text-xs">
                    <i class="fab fa-google text-red-500 text-sm"></i>
                    Sign in with Google
                </button>
            </div>
        </div>

        <p class="mt-8 text-gray-400 font-semibold text-sm">
            New here? <a href="signup.html" class="text-blue-600 font-black hover:underline underline-offset-4">Create
                Account</a>
        </p>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-btn').addEventListener('click', login);

        // Initialize 3D Background
        VANTA.NET({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x3b82f6,
            backgroundColor: 0xf9f7f2,
            points: 12.00,
            maxDistance: 22.00,
            spacing: 16.00
        });
    </script>
</body>

</html>
