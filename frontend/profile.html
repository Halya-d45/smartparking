<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
</head>
<body class="gradient-bg">
    <nav class="navbar glass-card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-parking"></i></div>
            <span class="gradient-text">Smart Parking</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Map View</a>
            <a href="bookings.html">My Bookings</a>
            <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="app-container mt-4 animate-fade">
        <div class="glass-card p-4" style="max-width: 600px; margin: 40px auto; padding: 40px;">
            <h2 class="gradient-text mb-4">My Profile</h2>
            <div class="profile-info">
                <p><strong>Name:</strong> <span id="pName"></span></p>
                <p><strong>Email:</strong> <span id="pEmail"></span></p>
                <p><strong>Account Type:</strong> <span class="badge badge-primary" id="pRole"></span></p>
            </div>
            <hr class="my-4" style="opacity: 0.1; margin: 20px 0;">
            <button class="btn btn-outline" onclick="alert('Profile editing coming soon!')">Edit Profile</button>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if(user) {
            document.getElementById("pName").innerText = user.name;
            document.getElementById("pEmail").innerText = user.email;
            document.getElementById("pRole").innerText = user.role || "User";
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
