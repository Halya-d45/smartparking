<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark Dashboard - Premium Exploration</title>

    <!-- Global Styles & Map CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        .dashboard-container {
            display: flex;
            height: calc(100vh - 73px);
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 400px;
            background: var(--bg-main);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            position: relative;
            margin-top: 16px;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: white;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(45, 99, 255, 0.1);
        }

        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .results-container h2 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Parking Card Enhancements */
        .parking-card {
            margin-bottom: 16px;
            padding: 16px;
            cursor: pointer;
        }

        .parking-img {
            width: 100%;
            height: 140px;
            border-radius: var(--radius-md);
            object-fit: cover;
            margin-bottom: 12px;
        }

        .parking-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .parking-info p {
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .parking-meta {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-tag {
            font-weight: 700;
            color: var(--accent);
        }

        /* Map Container */
        .map-wrapper {
            flex: 1;
            position: relative;
            background: var(--bg-deep);
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* Custom Leaflet Controls */
        .leaflet-bar {
            border: none !important;
            box-shadow: var(--shadow-md) !important;
        }

        .leaflet-bar a {
            background: var(--bg-card) !important;
            color: white !important;
            border-bottom: 1px solid var(--border-color) !important;
        }

        @media (max-width: 900px) {
            .dashboard-container { flex-direction: column; }
            .sidebar { width: 100%; height: 40%; }
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <div class="logo-icon"><i class='bx bxs-parking'></i></div>
            SmartPark
        </div>
        <nav style="display: flex; gap: 30px;">
            <a href="dashboard.html" class="active" style="color: var(--primary); font-weight: 600;">Explore</a>
            <a href="saved.html">Saved</a>
            <a href="bookings.html">Bookings</a>
            <a href="profile.html">Profile</a>
        </nav>
        <div class="user-profile" style="display: flex; align-items: center; gap: 12px;">
            <div style="text-align: right; display: none; @media(min-width: 600px){ display: block; }">
                <div style="font-size: 13px; font-weight: 600;">John Doe</div>
                <div style="font-size: 11px; color: var(--text-dim);">Premium User</div>
            </div>
            <img src="https://i.pravatar.cc/100?u=parking" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary);">
        </div>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Find Parking</h3>
                <div class="search-box">
                    <i class='bx bx-search'></i>
                    <input type="text" id="searchInput" placeholder="Search city or landmark..." onkeyup="if(event.key==='Enter') searchPlace()">
                </div>
                <button class="btn btn-primary mt-4" style="width: 100%;" onclick="searchPlace()">
                    Search Location
                </button>
            </div>

            <div class="results-container">
                <h2 id="resultsTitle">
                    <i class='bx bx-map-pin'></i> Nearby Spots
                </h2>
                <div id="parkingResults">
                    <div style="text-align: center; padding: 40px 20px; color: var(--text-muted);">
                        <i class='bx bx-current-location' style="font-size: 48px; margin-bottom: 16px;"></i>
                        <p>Search a location to see premium parking spots near you.</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="map-wrapper">
            <div id="map"></div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* MAP INITIALIZATION */
        var map = L.map('map', {
            zoomControl: false // Custom position later
        }).setView([16.3067, 80.4365], 13);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let markers = [];

        /* SEARCH PLACE */
        async function searchPlace() {
            let place = document.getElementById("searchInput").value;
            if(!place) return;

            const searchBtn = document.querySelector('.sidebar-header .btn-primary');
            searchBtn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Searching...";

            try {
                let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${place}`);
                let data = await res.json();

                if (data.length == 0) {
                    alert("Location not found. Please try another search.");
                    return;
                }

                let lat = data[0].lat;
                let lon = data[0].lon;

                map.setView([lat, lon], 15);
                findParking(lat, lon);
                document.getElementById("resultsTitle").innerHTML = `<i class='bx bx-map-alt'></i> Spots in ${place}`;
            } catch (error) {
                console.error(error);
            } finally {
                searchBtn.innerHTML = "Search Location";
            }
        }

        /* FIND PARKING */
        async function findParking(lat, lon) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            let results = document.getElementById("parkingResults");
            results.innerHTML = "<div class='text-center' style='padding: 40px;'><i class='bx bx-loader-alt bx-spin' style='font-size: 32px;'></i><p class='mt-4'>Fetching spots...</p></div>";

            let query = `[out:json];node["amenity"="parking"](around:1000,${lat},${lon});out;`;
            
            try {
                let response = await fetch("https://overpass-api.de/api/interpreter", {
                    method: "POST",
                    body: query
                });
                let data = await response.json();

                results.innerHTML = "";

                if (data.elements.length === 0) {
                    results.innerHTML = "<div class='text-center' style='padding: 40px;'><p>No parking found in this area.</p></div>";
                    return;
                }

                data.elements.forEach((p, i) => {
                    let marker = L.marker([p.lat, p.lon]).addTo(map);
                    markers.push(marker);

                    let name = p.tags.name || "Premium Parking " + (i + 1);
                    let address = `Latitude: ${parseFloat(p.lat).toFixed(4)}, Longitude: ${parseFloat(p.lon).toFixed(4)}`;
                    let image = `https://images.unsplash.com/photo-1506521781263-d8422e82f27a?w=400&q=80&sig=${i}`;
                    let price = `$${(Math.random() * 5 + 2).toFixed(2)}/hr`;

                    let card = `
                        <div class="card parking-card">
                            <img src="${image}" class="parking-img">
                            <div class="parking-info">
                                <h4>${name}</h4>
                                <p><i class='bx bx-map'></i> ${address}</p>
                            </div>
                            <div class="parking-meta">
                                <span class="price-tag">${price}</span>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;" 
                                        onclick="saveParking('${name}','${address}','${price}','${image}')">
                                        <i class='bx bx-bookmark'></i>
                                    </button>
                                    <button class="btn btn-primary" style="padding: 6px 12px; font-size: 12px;"
                                        onclick="bookParking('${name}','${address}','${price}','${image}')">
                                        Book Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    results.innerHTML += card;
                });
            } catch (error) {
                results.innerHTML = "<div class='text-center' style='padding: 40px; color: var(--error);'><p>Failed to load parking data.</p></div>";
            }
        }

        /* STORAGE FUNCTIONS */
        function saveParking(name, address, price, image) {
            let saved = JSON.parse(localStorage.getItem("savedParking")) || [];
            if (saved.some(p => p.name === name)) {
                alert("This spot is already in your saved list.");
                return;
            }
            saved.push({ name, address, price, image });
            localStorage.setItem("savedParking", JSON.stringify(saved));
            alert("Parking saved successfully!");
        }

        function bookParking(name, address, price, image) {
            let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
            bookings.push({
                place: name,
                address: address,
                date: new Date().toLocaleDateString(),
                time: "1 hour (Est)",
                status: "Pending Exploration"
            });
            localStorage.setItem("bookings", JSON.stringify(bookings));
            window.location.href = "bookings.html";
        }
    </script>
</body>
</html>
>
