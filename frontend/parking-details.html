<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Slot | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="details-page gradient-bg">

<nav class="navbar glass-card">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html">Map View</a>
        <a href="bookings.html">My Bookings</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="app-container">
    <div class="back-nav mt-4">
        <a href="dashboard.html"><i class="fas fa-chevron-left"></i> Back to Map</a>
    </div>

    <main class="details-grid animate-fade">
        <div class="lot-info-section">
            <div class="glass-card info-card">
                <img id="lotImage" src="" alt="Parking Lot" class="lot-hero-img">
                <div class="info-content">
                    <h1 id="lotName">Loading Lot...</h1>
                    <p id="lotLocation"><i class="fas fa-map-marker-alt"></i> Loading...</p>
                    <div class="tags">
                        <span class="badge badge-success">CCTV Protected</span>
                        <span class="badge badge-primary">EV Charging</span>
                    </div>
                </div>
            </div>

            <div class="glass-card price-card mt-4">
                <div class="price-header">
                    <span>Rate</span>
                    <h2 id="lotPrice">$0.00/hr</h2>
                </div>
                <div class="form-group mt-4">
                    <label>Select Duration</label>
                    <div class="input-wrapper">
                        <i class="fas fa-clock"></i>
                        <select id="duration" class="premium-input">
                            <option value="1">1 Hour</option>
                            <option value="2">2 Hours</option>
                            <option value="4">4 Hours</option>
                            <option value="8">8 Hours</option>
                            <option value="24">Full Day</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="slot-selection-section">
            <div class="glass-card slot-card">
                <div class="card-header">
                    <h3>Select Your Slot</h3>
                    <div class="legend">
                        <span class="leg-item"><span class="box av"></span> Free</span>
                        <span class="leg-item"><span class="box bk"></span> Booked</span>
                        <span class="leg-item"><span class="box sl"></span> Selected</span>
                    </div>
                </div>
                <div id="slotGrid" class="slot-grid">
                    <!-- Slots dynamic -->
                </div>
                <button id="confirmBtn" class="btn-premium w-full mt-4" disabled onclick="confirmBooking()">
                    Confirm Selection
                </button>
            </div>
        </div>
    </main>
</div>

<style>
.details-grid {
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 30px;
    margin-top: 20px;
}
.back-nav a {
    color: var(--text-secondary);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.info-card { padding: 0; overflow: hidden; }
.lot-hero-img { width: 100%; height: 200px; object-fit: cover; }
.info-content { padding: 24px; }
.info-content h1 { font-size: 24px; margin-bottom: 8px; }
.info-content p { color: var(--text-secondary); margin-bottom: 16px; }

.price-header { display: flex; justify-content: space-between; align-items: baseline; }
.price-header span { color: var(--text-muted); font-size: 14px; }

.slot-card { padding: 30px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.legend { display: flex; gap: 15px; font-size: 12px; }
.leg-item { display: flex; align-items: center; gap: 6px; }
.box { width: 12px; height: 12px; border-radius: 3px; }
.box.av { border: 1px solid var(--accent-blue); }
.box.bk { background: var(--bg-muted); }
.box.sl { background: var(--accent-blue); }

.slot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 15px;
    background: rgba(0,0,0,0.2);
    padding: 20px;
    border-radius: var(--radius-md);
}
.slot {
    height: 80px;
    border: 2px solid var(--line-border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
}
.slot.available:hover {
    border-color: var(--accent-blue);
    background: var(--accent-blue-glow);
}
.slot.selected {
    background: var(--accent-blue);
    border-color: var(--accent-cyan);
    color: white;
}
.slot.booked {
    background: var(--bg-muted);
    opacity: 0.5;
    cursor: not-allowed;
    color: var(--text-muted);
}
</style>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/booking.js"></script>
</body>
</html>
