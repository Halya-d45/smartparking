<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="gradient-bg">

<nav class="navbar glass-card">
    <div class="logo" onclick="window.location.href='dashboard.html'" style="cursor:pointer">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html">Map View</a>
        <a href="bookings.html">My Bookings</a>
        <a href="saved.html">Saved Slots</a>
        <a href="profile.html" class="active"><i class="fas fa-user-circle"></i> Profile</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="app-container mt-4 animate-fade">
    <div class="profile-layout" style="display: grid; grid-template-columns: 1fr 380px; gap: 40px; max-width: 1400px; margin: 40px auto; padding: 0 40px;">
        
        <div class="main-profile-content">
            <div class="glass-card" style="padding: 50px;">
                <div class="profile-header" style="display: flex; align-items: center; gap: 32px; margin-bottom: 50px;">
                    <div class="profile-avatar shadow-main" style="width: 100px; height: 100px; background: rgba(59, 130, 246, 0.15); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--accent-blue); border: 2px solid var(--line-active);">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div>
                        <h2 class="gradient-text" style="font-size: 34px; font-weight: 800; letter-spacing: -1px;" id="pNameHeader">Account Holder</h2>
                        <p style="color: var(--text-muted); font-size: 16px; font-weight: 500;">Premium Enterprise Member</p>
                    </div>
                </div>

                <div class="profile-details-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                    <div class="detail-item glass-card" style="padding: 24px; background: rgba(255,255,255,0.01); border-radius: 20px;">
                        <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; font-weight: 700;">Full Name</span>
                        <span id="pName" style="font-size: 18px; font-weight: 600;">-</span>
                    </div>
                    <div class="detail-item glass-card" style="padding: 24px; background: rgba(255,255,255,0.01); border-radius: 20px;">
                        <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; font-weight: 700;">Email Member</span>
                        <span id="pEmail" style="font-size: 18px; font-weight: 600;">-</span>
                    </div>
                    <div class="detail-item glass-card" style="grid-column: 1 / -1; padding: 24px; background: rgba(255,255,255,0.01); border-radius: 20px;">
                        <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; font-weight: 700;">Identification Hash</span>
                        <span id="pRole" style="font-size: 16px; font-weight: 500; font-family: 'Fira Code', monospace; color: var(--accent-cyan);">${user.id}</span>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="mt-4">
                    <button class="btn-premium" style="height: 60px;" onclick="alert('Secure encryption active. Profile lock enabled.')">
                        <i class="fas fa-lock"></i> Account Security
                    </button>
                    <button class="btn-premium" style="height: 60px; background: var(--bg-surface); border: 1px solid var(--line-active);" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> End Session
                    </button>
                </div>
            </div>
        </div>

        <aside class="profile-stats-sidebar animate-fade" style="animation-delay: 0.2s;">
            <div class="glass-card stat-card mb-4" style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(15, 23, 42, 0.7));">
                <div class="stat-icon shadow-main"><i class="fas fa-bolt"></i></div>
                <div class="stat-details">
                    <h2 id="activeBookingsCount">0</h2>
                    <p>Active Slots</p>
                </div>
            </div>
            
            <div class="glass-card stat-card mb-4" style="background: linear-gradient(135deg, rgba(34, 211, 238, 0.1), rgba(15, 23, 42, 0.7));">
                <div class="stat-icon shadow-main" style="color: var(--accent-cyan); background: rgba(34, 211, 238, 0.1); border-color: rgba(34, 211, 238, 0.3);">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="stat-details">
                    <h2 id="savedPlacesCount">0</h2>
                    <p>Saved Hubs</p>
                </div>
            </div>

            <div class="glass-card mt-4" style="padding: 30px; text-align: center; border-style: dashed; border-color: var(--line-active);">
                <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px; font-weight: 500;">Access your full historical activity logs and session data here.</p>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button class="btn-premium btn-sm" onclick="window.location.href='bookings.html'">
                        <i class="fas fa-history"></i> Global Activity
                    </button>
                    <button class="btn-premium btn-sm" style="background: transparent; border: 1px solid var(--line-soft);" onclick="window.location.href='saved.html'">
                        <i class="fas fa-map-marked-alt"></i> Saved Locations
                    </button>
                </div>
            </div>
        </aside>

    </div>
</div>

<style>
.profile-stats-sidebar .stat-card {
    padding: 20px;
}
</style>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem("user"));
    if(user) {
        document.getElementById("pNameHeader").innerText = user.name;
        document.getElementById("pName").innerText = user.name;
        document.getElementById("pEmail").innerText = user.email;
        document.getElementById("pRole").innerText = user.id;
        loadStats();
    } else {
        window.location.href = "login.html";
    }

    async function loadStats() {
        try {
            const token = localStorage.getItem("token");
            let localSavedCount = JSON.parse(localStorage.getItem("guest_saved") || "[]").length;
            
            if (!token) {
                document.getElementById("savedPlacesCount").innerText = localSavedCount;
                return;
            }

            const res = await fetch(`${CONFIG.API_BASE}/saved/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stats = await res.json();
            
            // Combine API and local for "Real" feel
            const apiSaved = stats.savedPlaces || 0;
            const apiBookings = stats.activeBookings || 0;
            
            // For saved places, we take the larger of the two or combine if needed
            // But usually, local count is more immediate
            document.getElementById("activeBookingsCount").innerText = apiBookings;
            document.getElementById("savedPlacesCount").innerText = Math.max(apiSaved, localSavedCount);
            
            console.log("Stats loaded:", { apiBookings, apiSaved, localSavedCount });
        } catch (err) {
            console.error("Stats Error:", err);
            // Fallback to local only on error
            let localSavedCount = JSON.parse(localStorage.getItem("guest_saved") || "[]").length;
            document.getElementById("savedPlacesCount").innerText = localSavedCount;
        }
    }
</script>
</body>
</html>
