
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPark - Spot Details</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>

:root{
--bg-main:#0b101a;
--bg-card:#151a27;
--primary-blue:#1c5ae0;
--text-gray:#8a94a6;
--border:#222939;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Inter',sans-serif;
}

body{
background:black;
display:flex;
justify-content:center;
color:white;
}

/* RESPONSIVE APP CONTAINER */

.app-container{
width:100%;
max-width:1000px;
min-height:100vh;
background:var(--bg-main);
position:relative;
padding-bottom:120px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.header i{
font-size:24px;
cursor:pointer;
}

/* HERO IMAGE */

.hero-img{
width:100%;
height:280px;
object-fit:cover;
}

/* CONTENT */

.content{
padding:30px;
margin-top:-40px;
background:var(--bg-main);
border-radius:30px 30px 0 0;
}

.thumbnail{
width:90px;
height:90px;
border-radius:12px;
margin-top:-60px;
margin-bottom:20px;
border:3px solid var(--bg-main);
}

.title-area h1{
font-size:26px;
margin-bottom:6px;
}

.location{
display:flex;
align-items:center;
gap:6px;
font-size:14px;
color:var(--text-gray);
margin-bottom:20px;
}

.tags{
display:flex;
gap:10px;
margin-bottom:30px;
}

.tag{
padding:5px 10px;
border-radius:6px;
font-size:11px;
font-weight:600;
}

.tag-green{
background:rgba(16,185,129,0.1);
color:#10b981;
}

.tag-blue{
background:rgba(28,90,224,0.1);
color:var(--primary-blue);
}

/* STATS */

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:var(--bg-card);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
}

.stat-card label{
font-size:12px;
color:var(--text-gray);
}

.stat-card .value{
font-size:22px;
font-weight:700;
color:var(--primary-blue);
}

/* USER DURATION INPUT */

.duration-box{
margin-bottom:30px;
}

.duration-box input{
width:100%;
padding:14px;
margin-top:8px;
border-radius:8px;
border:1px solid var(--border);
background:#0f141e;
color:white;
}

/* TOTAL PRICE */

.total{
font-size:22px;
font-weight:700;
margin-top:10px;
}

/* AMENITIES */

.section-title{
font-size:18px;
margin-bottom:14px;
}

.amenities-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:30px;
}

.amenity{
background:var(--bg-card);
padding:14px;
border-radius:10px;
display:flex;
gap:10px;
align-items:center;
}

.amenity i{
color:var(--primary-blue);
}

/* MAP */

.map-preview{
height:170px;
background:#333;
border-radius:12px;
overflow:hidden;
margin-bottom:30px;
}

.map-preview img{
width:100%;
height:100%;
object-fit:cover;
}

/* FOOTER */

.footer-action{
position:fixed;
bottom:0;
width:100%;
max-width:1000px;
background:var(--bg-main);
padding:20px;
border-top:1px solid var(--border);
}

.book-btn{
width:100%;
padding:16px;
background:var(--primary-blue);
border:none;
border-radius:12px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.cancel-policy{
text-align:center;
font-size:11px;
color:#4d566b;
margin-top:10px;
}

/* RESPONSIVE */

@media (min-width:768px){

.content{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

}

</style>
</head>


<body>

<div class="app-container">

<header class="header">

<i class='bx bx-left-arrow-alt' onclick="history.back()"></i>

<h3>Spot Details</h3>

<i class='bx bx-share-alt'></i>

</header>


<img src="https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&w=800&q=80" class="hero-img">


<div class="content">

<div>

<img src="https://images.unsplash.com/photo-1573348722427-f1d6819fdf98?auto=format&fit=crop&w=150&q=80" class="thumbnail">

<div class="title-area">
<h1>Skyline Premium Parking</h1>
<div class="location">
<i class='bx bxs-map'></i>
450 Downtown Ave
</div>
</div>

<div class="tags">
<span class="tag tag-green">OPEN 24/7</span>
<span class="tag tag-blue">INSTANT BOOKING</span>
</div>

<div class="stats-grid">

<div class="stat-card">
<label>Hourly Rate</label>
<div class="value">$6.5 /hr</div>
</div>

<div class="stat-card">
<label>Availability</label>
<div class="value">08 spots</div>
</div>

</div>

<div class="duration-box">

<label>Enter Parking Duration (hours)</label>

<input type="number" id="hours" placeholder="Example: 2" min="1" oninput="calculatePrice()">

<div class="total">
Total Price: $<span id="price">0</span>
</div>

</div>

</div>


<div>

<h3 class="section-title">Amenities</h3>

<div class="amenities-grid">

<div class="amenity"><i class='bx bxs-ev-station'></i>EV Charging</div>

<div class="amenity"><i class='bx bxs-shield'></i>24/7 Security</div>

<div class="amenity"><i class='bx bxs-video'></i>CCTV</div>

<div class="amenity"><i class='bx bx-vertical-center'></i>Elevator</div>

</div>

<h3 class="section-title">Location</h3>

<div class="map-preview">
<img src="https://images.unsplash.com/photo-1548345680-f5475ea5df84?auto=format&fit=crop&w=800&q=80">
</div>

</div>

</div>


<div class="footer-action">

<button class="book-btn" onclick="goToSlot()">
BOOK NOW
</button>

<p class="cancel-policy">
No cancellation fee up to 1 hour before arrival
</p>

</div>

</div>


<script>

let rate=6.5

function calculatePrice(){

let hours=document.getElementById("hours").value

if(hours){

let total=(hours*rate).toFixed(2)

document.getElementById("price").innerText=total

}

}

function goToSlot(){

let hours=document.getElementById("hours").value

if(!hours){

alert("Please enter parking duration")

return

}

localStorage.setItem("duration",hours)

window.location.href="slot-selection.html"

}

</script>

</body>
</html>
