<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Parking - SmartPark Premium</title>

    <!-- Global Styles & Fonts -->
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            background: var(--bg-deep);
            padding-bottom: 80px;
        }

        .saved-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .saved-card {
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .saved-img {
            width: 100px;
            height: 80px;
            border-radius: var(--radius-md);
            object-fit: cover;
        }

        .saved-details {
            flex: 1;
        }

        .saved-details h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .saved-details p {
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .price-tag {
            font-weight: 700;
            color: var(--accent);
            font-size: 14px;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .remove-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: center;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
        }

        .remove-btn:hover {
            background: var(--error);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <div class="logo-icon"><i class='bx bxs-bookmark-star'></i></div>
            SmartPark
        </div>
        <div style="font-weight: 600;">Saved Spots</div>
        <div style="width: 40px;"></div>
    </header>

    <main class="saved-container">
        <div id="savedList">
            <div class="empty-state">
                <i class='bx bx-bookmark-plus' style="font-size: 64px; margin-bottom: 20px; opacity: 0.5;"></i>
                <h3>No saved locations</h3>
                <p>Save interesting parking spots to access them quickly later.</p>
                <a href="dashboard.html" class="btn btn-primary mt-4">Browse Map</a>
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <div class="navbar" style="position: fixed; bottom: 0; top: auto; width: 100%; border-top: 1px solid var(--border-color); border-bottom: none; padding: 10px 0;">
        <div style="display: flex; width: 100%; justify-content: space-around; align-items: center;">
            <a href="dashboard.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim);">
                <i class='bx bx-map-alt' style="font-size: 24px;"></i>
                <span style="font-size: 10px; font-weight: 600;">Explore</span>
            </a>
            <a href="saved.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--primary);">
                <i class='bx bxs-bookmark' style="font-size: 24px;"></i>
                <span style="font-size: 10px; font-weight: 600;">Saved</span>
            </a>
            <a href="bookings.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim);">
                <i class='bx bx-calendar' style="font-size: 24px;"></i>
                <span style="font-size: 10px; font-weight: 600;">Bookings</span>
            </a>
            <a href="profile.html" style="display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim);">
                <i class='bx bx-user-circle' style="font-size: 24px;"></i>
                <span style="font-size: 10px; font-weight: 600;">Profile</span>
            </a>
        </div>
    </div>

    <script>
        let saved = JSON.parse(localStorage.getItem("savedParking")) || [];
        const savedList = document.getElementById("savedList");

        function renderSaved() {
            if (saved.length === 0) return;

            savedList.innerHTML = "";
            saved.forEach((place, index) => {
                const card = `
                    <div class="card saved-card" style="animation: slideIn 0.4s ease-out ${index * 0.1}s both;">
                        <img src="${place.image}" class="saved-img">
                        <div class="saved-details">
                            <h3>${place.name}</h3>
                            <p><i class='bx bx-map'></i> ${place.address}</p>
                            <div class="price-tag mt-2">${place.price}</div>
                        </div>
                        <div class="action-btns">
                            <button class="remove-btn" onclick="removeSaved(${index})">
                                <i class='bx bx-trash'></i>
                            </button>
                            <button class="btn btn-primary" style="padding: 6px 12px; font-size: 11px;" onclick="location.href='dashboard.html'">
                                Book
                            </button>
                        </div>
                    </div>
                `;
                savedList.innerHTML += card;
            });
        }

        function removeSaved(index) {
            saved.splice(index, 1);
            localStorage.setItem("savedParking", JSON.stringify(saved));
            if (saved.length === 0) {
                location.reload();
            } else {
                renderSaved();
            }
        }

        renderSaved();
    </script>

    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
