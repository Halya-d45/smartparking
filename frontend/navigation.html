
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartPark Navigation</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
}

/* MAP GRID */

.map-bg{
background-color:#f0f3f7;
background-image:
linear-gradient(#e1e6ed 1px,transparent 1px),
linear-gradient(90deg,#e1e6ed 1px,transparent 1px);
background-size:40px 40px;
}

/* LOCATION PULSE */

@keyframes pulse-ring{
0%{transform:scale(.8);opacity:.8}
50%{transform:scale(1.5);opacity:.3}
100%{transform:scale(.8);opacity:.8}
}

.animate-pulse-ring{
animation:pulse-ring 2s infinite;
}

</style>

</head>

<body class="bg-black min-h-screen flex flex-col">

<!-- MAIN APP -->

<div class="flex-1 relative map-bg">

<!-- MAP AREA -->
<div id="map" class="absolute inset-0"></div>

<!-- NAVIGATION HEADER -->

<div class="absolute top-4 left-4 right-4 bg-[#233a8c] rounded-2xl p-4 text-white flex justify-between items-center shadow-xl">

<div class="flex items-center gap-3">

<button onclick="goBack()" class="bg-white/20 p-3 rounded-xl">
←
</button>

<div>

<h2 id="directionText" class="text-xl font-bold">
Turn left
</h2>

<p id="roadText" class="text-sm opacity-80">
Entrance Row A
</p>

</div>

</div>

<div class="text-right">

<div id="distanceText" class="text-2xl font-bold">
150
</div>

<div class="text-xs opacity-80">
FT
</div>

</div>

</div>

<!-- MAP CONTROLS -->

<div class="absolute right-4 top-1/3 flex flex-col gap-3">

<button onclick="centerLocation()" class="bg-white p-3 rounded-full shadow">
📍
</button>

<button onclick="toggleVoice()" class="bg-white p-3 rounded-full shadow">
🔊
</button>

</div>

<!-- LOCATION MARKER -->

<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">

<div class="w-10 h-10 relative">

<div class="absolute inset-0 bg-green-400 rounded-full animate-pulse-ring opacity-40"></div>

<div class="absolute inset-2 bg-blue-500 rounded-full"></div>

</div>

</div>

</div>

<!-- BOTTOM PANEL -->

<div class="bg-white rounded-t-3xl p-6 shadow-2xl">

<div class="grid grid-cols-3 text-center mb-6">

<div>

<p class="text-xs text-gray-400">ETA</p>

<p id="etaTime" class="text-xl font-bold">
14:32
</p>

</div>

<div>

<p class="text-xs text-gray-400">TIME</p>

<p id="travelTime" class="text-xl font-bold">
2 min
</p>

</div>

<div>

<p class="text-xs text-gray-400">SPOT</p>

<p id="parkingSpot" class="text-xl font-bold text-green-600">
A-12
</p>

</div>

</div>

<div class="flex gap-4">

<button onclick="exitNavigation()"
class="flex-1 bg-gray-200 py-4 rounded-xl font-semibold">

Exit

</button>

<button onclick="finishTrip()"
class="flex-1 bg-green-500 text-white py-4 rounded-xl font-semibold">

Finish Trip

</button>

</div>

</div>

<script>

/* ---------- NAVIGATION FUNCTIONS ---------- */

function goBack(){
window.history.back()
}

/* CENTER MAP LOCATION */

function centerLocation(){

console.log("Centering map")

// later connect to map API

}

/* VOICE NAVIGATION */

let voiceEnabled=true

function toggleVoice(){

voiceEnabled=!voiceEnabled

console.log("Voice:",voiceEnabled)

}

/* EXIT NAVIGATION */

function exitNavigation(){

if(confirm("Exit navigation?")){

window.location.href="dashboard.html"

}

}

/* FINISH TRIP */

function finishTrip(){

alert("Trip Completed")

// later connect to booking API

window.location.href="bookings.html"

}

/* SAMPLE DATA UPDATE (for backend later) */

function updateNavigation(data){

document.getElementById("directionText").innerText=data.direction
document.getElementById("roadText").innerText=data.road
document.getElementById("distanceText").innerText=data.distance
document.getElementById("etaTime").innerText=data.eta
document.getElementById("travelTime").innerText=data.time
document.getElementById("parkingSpot").innerText=data.spot

}

/* EXAMPLE */

updateNavigation({

direction:"Turn Left",
road:"Row B Entrance",
distance:120,
eta:"14:35",
time:"3 min",
spot:"B-08"

})

</script>

</body>
</html>
