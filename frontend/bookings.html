<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bookings-page gradient-bg">

<nav class="navbar glass-card">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html">Map View</a>
        <a href="bookings.html" class="active">My Bookings</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="app-container content-section animate-fade">
    <header class="section-header">
        <h1>My Bookings</h1>
        <p>Manage your active and past parking sessions</p>
    </header>

    <div class="glass-card table-card">
        <table class="premium-table">
            <thead>
                <tr>
                    <th>Parking Lot</th>
                    <th>Slot</th>
                    <th>Date</th>
                    <th>Duration</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="bookingsTable">
                <!-- Data dynamic -->
            </tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-calendar-times"></i>
            <p>You haven't made any bookings yet.</p>
            <a href="dashboard.html" class="btn-premium btn-sm mt-4">Find Parking</a>
        </div>
    </div>
</div>

<style>
.content-section { margin-top: 40px; }
.section-header { margin-bottom: 30px; }
.section-header h1 { font-size: 32px; margin-bottom: 8px; }

.table-card { padding: 0; overflow: hidden; }
.premium-table { width: 100%; border-collapse: collapse; }
.premium-table th { 
    text-align: left; 
    padding: 20px; 
    background: rgba(255,255,255,0.03); 
    font-size: 13px; 
    color: var(--text-muted); 
    text-transform: uppercase;
    letter-spacing: 1px;
}
.premium-table td { padding: 20px; border-bottom: 1px solid var(--line-soft); font-size: 14px; }
.premium-table tr:last-child td { border: none; }

.status-badge {
    padding: 6px 12px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
}
.status-confirmed { background: rgba(16, 185, 129, 0.1); color: #10b981; }

.empty-state { text-align: center; padding: 60px; color: var(--text-muted); }
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
</style>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem("user"));

    async function loadBookings() {
        if(!user) return;

        try {
            const res = await fetch(`${CONFIG.API_BASE}/booking?userId=${user.id}`);
            const bookings = await res.json();

            const table = document.getElementById("bookingsTable");
            const empty = document.getElementById("emptyState");

            if(bookings.length === 0) {
                empty.style.display = "block";
                return;
            }

            table.innerHTML = bookings.map(b => `
                <tr>
                    <td><strong>Lot ID: ${b.parkingId}</strong></td>
                    <td><span class="badge badge-primary">${b.slot}</span></td>
                    <td>${new Date(b.date).toLocaleDateString()}</td>
                    <td>${b.duration} Hours</td>
                    <td><span class="status-badge status-confirmed">Confirmed</span></td>
                    <td><button class="btn btn-outline btn-sm">View Receipt</button></td>
                </tr>
            `).join('');

        } catch (err) {
            console.error(err);
        }
    }

    loadBookings();
</script>
</body>
</html>
