<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page gradient-bg">

<nav class="navbar glass-card">
    <div class="logo" onclick="window.location.href='dashboard.html'" style="cursor:pointer">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-toggle" id="navToggle">
        <i class="fas fa-bars"></i>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="dashboard.html">Map View</a>
        <a href="bookings.html">My Bookings</a>
        <a href="saved.html">Saved Slots</a>
        <a href="profile.html" class="active"><i class="fas fa-user-circle"></i> Profile</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<script>
    // Navigation Toggle Logic
    const toggleBtn = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    
    if (toggleBtn && navLinks) {
        toggleBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = toggleBtn.querySelector('i');
            if (navLinks.classList.contains('active')) {
                icon.classList.replace('fa-bars', 'fa-times');
            } else {
                icon.classList.replace('fa-times', 'fa-bars');
            }
        });
    }
</script>

<div class="app-container">
    <div class="profile-layout-optimized">
        <!-- Main Profile Info -->
        <div class="profile-main-card glass-card animate-fade">
            <div class="profile-header-premium">
                <div class="profile-avatar">
                    <i class="fas fa-user-astronaut"></i>
                </div>
                <div class="profile-info-text">
                    <h1 class="profile-name-main gradient-text" id="userNameLarge">Sahazad</h1>
                    <p class="profile-subtext">Premium Member since 2024</p>
                </div>
            </div>

            <div class="profile-details-grid-premium">
                <div class="glass-card-mini">
                    <span class="detail-label">Full Name</span>
                    <span class="detail-value" id="userNameHeader">Sahazad</span>
                </div>
                <div class="glass-card-mini">
                    <span class="detail-label">Email Address</span>
                    <span class="detail-value" id="userEmail">sahazad@example.com</span>
                </div>
                <div class="glass-card-mini detail-wide">
                    <span class="detail-label">User Identifier</span>
                    <span class="detail-value hash-text" id="userId">USR-2948-284-XB10</span>
                </div>
            </div>

            <div class="profile-actions-grid mt-4">
                <button class="btn-premium action-height"><i class="fas fa-edit"></i> Edit Profile</button>
                <button class="btn-premium btn-outline-alt action-height" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- Right Side: Quick Stats -->
        <div class="profile-stat-panel animate-fade">
            <div class="glass-card stat-card stat-card-blue mb-4">
                <div class="stat-icon"><i class="fas fa-car-side"></i></div>
                <div class="stat-content">
                    <span class="detail-label">Total Bookings</span>
                    <h2 class="detail-value" style="font-size: 30px;">24</h2>
                </div>
            </div>
            
            <div class="glass-card stat-card stat-card-cyan">
                <div class="stat-icon stat-icon-cyan"><i class="fas fa-clock"></i></div>
                <div class="stat-content">
                    <span class="detail-label">Hours Parked</span>
                    <h2 class="detail-value" style="font-size: 30px;">142h</h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem("user"));
    if(user) {
        document.getElementById("userNameLarge").innerText = user.name;
        document.getElementById("userNameHeader").innerText = user.name;
        document.getElementById("userEmail").innerText = user.email || "test@example.com";
        document.getElementById("userId").innerText = (user.id || user._id) ? "USER-" + (user.id || user._id).toUpperCase() : "TEST-USER-ID";
    }
</script>
</body>
</html>
