
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPark - Sign In</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>

:root{
--bg-main:#0b101a;
--bg-card:#151a27;
--bg-input:#1e2536;
--border-color:#272f43;
--primary-blue:#1c5ae0;
--primary-blue-hover:#1648b8;
--text-white:#ffffff;
--text-gray:#8a94a6;
--text-dark-gray:#4d566b;
font-family:'Inter',sans-serif;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#05080d;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.app-container{
width:100%;
max-width:414px;
min-height:896px;
background:var(--bg-main);
display:flex;
flex-direction:column;
padding:40px 20px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.brand-header{
text-align:center;
margin-bottom:30px;
}

.logo-wrapper{
position:relative;
margin-bottom:14px;
}

.logo-wrapper::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:60px;
height:60px;
background:var(--primary-blue);
filter:blur(25px);
opacity:.6;
}

.brand-logo{
background:var(--primary-blue);
width:50px;
height:50px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:700;
position:relative;
}

.brand-header h1{
font-size:26px;
margin-bottom:6px;
}

.brand-header p{
color:var(--text-gray);
}

.login-card{
background:var(--bg-card);
border:1px solid var(--border-color);
border-radius:16px;
padding:24px;
}

.card-header{
margin-bottom:24px;
}

.card-header h2{
font-size:22px;
margin-bottom:5px;
}

.card-header p{
color:var(--text-gray);
font-size:14px;
}

.form-group{
margin-bottom:18px;
}

.label-row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.form-group label{
font-size:13px;
}

.forgot-password{
font-size:13px;
color:var(--primary-blue);
text-decoration:none;
}

.input-wrapper{
position:relative;
}

.input-wrapper i{
position:absolute;
top:50%;
transform:translateY(-50%);
color:var(--text-gray);
font-size:20px;
}

.icon-left{ left:12px; }

.eye-icon{
right:12px;
cursor:pointer;
}

.input-wrapper input{
width:100%;
background:var(--bg-input);
border:1px solid var(--border-color);
padding:14px 40px;
border-radius:10px;
color:white;
outline:none;
font-size:14px;
}

.input-wrapper input:focus{
border-color:var(--primary-blue);
box-shadow:0 0 0 2px rgba(28,90,224,.2);
}

.error{
font-size:12px;
color:#ff6b6b;
display:none;
margin-top:4px;
}

.primary-btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:var(--primary-blue);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.primary-btn:hover{
background:var(--primary-blue-hover);
}

.divider{
display:flex;
align-items:center;
text-align:center;
margin:24px 0;
font-size:12px;
color:var(--text-dark-gray);
}

.divider::before,
.divider::after{
content:"";
flex:1;
border-bottom:1px solid var(--border-color);
}

.divider::before{margin-right:14px;}
.divider::after{margin-left:14px;}

.social-login{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.social-btn{
background:var(--bg-input);
border:1px solid var(--border-color);
padding:13px;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
cursor:pointer;
}

.signup-link{
text-align:center;
margin-top:25px;
color:var(--text-gray);
}

.signup-link a{
color:var(--primary-blue);
text-decoration:none;
font-weight:600;
}

.footer-links{
margin-top:auto;
display:flex;
justify-content:center;
gap:20px;
padding-top:20px;
}

.footer-links a{
color:var(--text-dark-gray);
font-size:13px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="app-container">

<header class="brand-header">
<div class="logo-wrapper">
<div class="brand-logo">P</div>
</div>
<h1>SmartPark</h1>
<p>Find your perfect spot, anywhere.</p>
</header>

<main class="login-card">

<div class="card-header">
<h2>Welcome Back</h2>
<p>Please enter your details to sign in.</p>
</div>

<form id="loginForm">

<div class="form-group">

<div class="label-row">
<label for="email">Email</label>
</div>

<div class="input-wrapper">
<i class='bx bx-envelope icon-left'></i>
<input id="email" type="email" placeholder="name@example.com" required>
</div>

<div class="error" id="emailError">
Please enter a valid email
</div>

</div>

<div class="form-group">

<div class="label-row">
<label for="password">Password</label>
<a href="#" class="forgot-password">Forgot Password?</a>
</div>

<div class="input-wrapper">
<i class='bx bx-lock-alt icon-left'></i>
<input id="password" type="password" required>
<i class='bx bx-show eye-icon' onclick="togglePassword()"></i>
</div>

<div class="error" id="passError">
Password must be at least 6 characters
</div>

</div>

<button class="primary-btn" type="submit">
Sign In
</button>

</form>

<div class="divider">OR CONTINUE WITH</div>

<div class="social-login">
<button class="social-btn">
<i class='bx bxl-google'></i> Google
</button>

<button class="social-btn">
<i class='bx bxl-facebook'></i> Facebook
</button>
</div>

</main>

<div class="signup-link">
Don't have an account?
<a href="signup.html">Create an account</a>
</div>

<div class="footer-links">
<a href="#">Privacy Policy</a>
<a href="#">Terms of Service</a>
<a href="#">Support</a>
</div>

</div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit",function(e){

e.preventDefault();

let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value;

let valid=true;

if(!email.includes("@")){
document.getElementById("emailError").style.display="block";
valid=false;
}else{
document.getElementById("emailError").style.display="none";
}

if(password.length<6){
document.getElementById("passError").style.display="block";
valid=false;
}else{
document.getElementById("passError").style.display="none";
}

if(valid){

alert("Login Successful");

window.location.href="dashboard.html";

}

});

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

</script>

</body>
</html>
