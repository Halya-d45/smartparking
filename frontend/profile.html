<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d0f15;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:414px;
height:896px;
background:#071423;
color:white;
border-radius:20px;
overflow:hidden;
position:relative;
}

/* HEADER */

.header{
text-align:center;
padding:20px;
font-size:18px;
font-weight:600;
background:#081628;
}

/* PROFILE SECTION */

.profile{
display:flex;
flex-direction:column;
align-items:center;
padding:30px 20px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:url("https://i.pravatar.cc/150") center/cover;
margin-bottom:12px;
border:3px solid #2d63ff;
}

.name{
font-size:20px;
font-weight:600;
}

.email{
font-size:13px;
color:#9aa3b2;
margin-top:4px;
}

/* STATS */

.stats{
display:flex;
justify-content:space-around;
margin:20px;
background:#0f1f35;
padding:16px;
border-radius:14px;
}

.stat{
text-align:center;
}

.stat h3{
font-size:18px;
}

.stat span{
font-size:12px;
color:#8da2c1;
}

/* MENU */

.menu{
padding:10px 20px;
}

.menu-item{
background:#0f1f35;
padding:14px;
border-radius:12px;
margin-bottom:12px;
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
}

.menu-left{
display:flex;
align-items:center;
gap:10px;
}

.menu-left i{
font-size:18px;
color:#2d63ff;
}

/* LOGOUT */

.logout{
background:#1f2f48;
color:#ff5c5c;
}

/* BOTTOM NAV */

.nav{
position:absolute;
bottom:0;
width:100%;
height:70px;
background:#101726;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#8f98a7;
cursor:pointer;
}

.nav-item i{
font-size:22px;
margin-bottom:4px;
}

.nav-item.active{
color:#2d63ff;
}

</style>

</head>

<body>

<div class="app">

<div class="header">Profile</div>

<!-- PROFILE INFO -->

<div class="profile">

<div class="avatar"></div>

<div class="name">John Doe</div>
<div class="email">john@email.com</div>

</div>

<!-- USER STATS -->

<div class="stats">

<div class="stat">
<h3>12</h3>
<span>Bookings</span>
</div>

<div class="stat">
<h3>5</h3>
<span>Saved</span>
</div>

<div class="stat">
<h3>4.8</h3>
<span>Rating</span>
</div>

</div>

<!-- MENU -->

<div class="menu">

<div class="menu-item" onclick="location.href='bookings.html'">
<div class="menu-left">
<i class='bx bx-calendar'></i> My Bookings
</div>
<i class='bx bx-chevron-right'></i>
</div>

<div class="menu-item" onclick="location.href='saved.html'">
<div class="menu-left">
<i class='bx bx-bookmark'></i> Saved Locations
</div>
<i class='bx bx-chevron-right'></i>
</div>

<div class="menu-item">
<div class="menu-left">
<i class='bx bx-cog'></i> Settings
</div>
<i class='bx bx-chevron-right'></i>
</div>

<div class="menu-item logout">
<div class="menu-left">
<i class='bx bx-log-out'></i> Logout
</div>
</div>

</div>

<!-- BOTTOM NAV -->

<div class="nav">

<div class="nav-item" onclick="location.href='dashboard.html'">
<i class='bx bxs-map'></i>
Explore
</div>

<div class="nav-item" onclick="location.href='saved.html'">
<i class='bx bx-bookmark'></i>
Saved
</div>

<div class="nav-item" onclick="location.href='bookings.html'">
<i class='bx bx-calendar'></i>
Bookings
</div>

<div class="nav-item active">
<i class='bx bx-user'></i>
Profile
</div>

</div>

</div>

</body>
</html>
