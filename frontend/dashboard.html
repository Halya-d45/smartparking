<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        #map { width: 100%; height: 100%; min-height: 400px; }
        .hidden { display: none; }
    </style>
</head>
<body class="dashboard-page light-theme">

<nav class="navbar-modern">
    <div class="nav-container">
        <div class="logo-section" onclick="window.location.href='dashboard.html'" style="cursor:pointer">
            <div class="logo-icon-modern">
                <span class="logo-p">P</span>
            </div>
            <div>
                <span class="brand-text">Smart Parking</span>
                <div class="brand-subtitle">System</div>
            </div>
        </div>

        <div class="nav-menu">
            <a href="dashboard.html" class="nav-item active">
                <i class="fas fa-map"></i>
                <span>Map View</span>
                <div class="nav-glow"></div>
            </a>
            <a href="bookings.html" class="nav-item">
                <i class="fas fa-calendar-check"></i>
                <span>My Bookings</span>
            </a>
            <a href="saved.html" class="nav-item">
                <i class="fas fa-heart"></i>
                <span>Saved Slots</span>
            </a>
            <a href="payment.html" class="nav-item">
                <i class="fas fa-credit-card"></i>
                <span>Payments</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </div>

        <div class="user-dropdown">
            <button class="user-button" onclick="document.getElementById('userMenu').classList.toggle('hidden')">
                <i class="fas fa-user-circle user-icon"></i>
                <span id="userNameDisplay">User</span>
                <i class="fas fa-chevron-down"></i>
            </button>
            <ul id="userMenu" class="user-menu hidden">
                <li><a href="profile.html"><i class="fas fa-user-circle"></i> My Profile</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="dashboard-layout">
    <section class="top-metrics">
        <div class="metric-card">
            <div class="metric-title">Total Slots</div>
            <div class="metric-value" id="totalSlots">500</div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 75%;"></div>
            </div>
            <div class="metric-label">System Capacity</div>
        </div>
        <div class="metric-card available">
            <div class="metric-title">Available Now</div>
            <div class="metric-value" id="availableNow">124</div>
            <div class="status-indicator
