
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saved Parking</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0d0f15;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
text-align:center;
padding:18px;
font-size:20px;
font-weight:600;
background:#081628;
position:sticky;
top:0;
}

/* CONTENT */

.content{
flex:1;
padding:20px;
max-width:900px;
margin:auto;
width:100%;
}

/* CARD */

.card{
background:#0f1f35;
border-radius:14px;
padding:12px;
display:flex;
gap:12px;
margin-bottom:15px;
align-items:center;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
}

.card h3{
font-size:15px;
}

.card p{
font-size:12px;
color:#9aa3b2;
margin-top:3px;
}

.price{
margin-left:auto;
color:#2d63ff;
font-weight:600;
}

.remove{
margin-left:10px;
cursor:pointer;
color:#ff5c5c;
font-size:18px;
}

/* EMPTY STATE */

.empty{
text-align:center;
margin-top:80px;
color:#8f98a7;
}

/* NAV BAR */

.nav{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:#101726;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#8f98a7;
cursor:pointer;
}

.nav-item i{
font-size:22px;
margin-bottom:4px;
}

.nav-item.active{
color:#2d63ff;
}

</style>

</head>

<body>

<div class="header">
Saved Locations
</div>

<div class="content" id="savedList">

<div class="empty">
No saved parking locations
</div>

</div>


<!-- NAVIGATION -->

<div class="nav">

<div class="nav-item" onclick="location.href='dashboard.html'">
<i class='bx bxs-map'></i>
Explore
</div>

<div class="nav-item active">
<i class='bx bx-bookmark'></i>
Saved
</div>

<div class="nav-item" onclick="location.href='bookings.html'">
<i class='bx bx-calendar'></i>
Bookings
</div>

<div class="nav-item" onclick="location.href='profile.html'">
<i class='bx bx-user'></i>
Profile
</div>

</div>


<script>

/* Load saved locations */

let saved = JSON.parse(localStorage.getItem("savedParking")) || [];

const savedList = document.getElementById("savedList");


function renderSaved(){

savedList.innerHTML = "";

if(saved.length === 0){

savedList.innerHTML =
`<div class="empty">No saved parking locations</div>`;

return;

}

saved.forEach((place,index)=>{

const card = `
<div class="card">

<img src="${place.image}">

<div>

<h3>${place.name}</h3>

<p>${place.address}</p>

</div>

<div class="price">
${place.price}
</div>

<i class='bx bx-trash remove'
onclick="removeSaved(${index})"></i>

</div>
`;

savedList.innerHTML += card;

});

}


/* Remove saved location */

function removeSaved(index){

saved.splice(index,1);

localStorage.setItem("savedParking",JSON.stringify(saved));

renderSaved();

}


/* First load */

renderSaved();

</script>

</body>

</html>
