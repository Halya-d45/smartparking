<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Professional Sign In</title>

    <!-- Global Styles & Fonts -->
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #05080d);
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo {
            margin: 0 auto 16px;
        }

        .auth-card {
            padding: 40px 32px;
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            color: var(--text-dim);
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="auth-container">
    <header class="brand-header">
        <div class="logo-icon brand-logo">
            <i class='bx bxs-parking'></i>
        </div>
        <h1>SmartPark</h1>
        <p style="color: var(--text-dim); margin-top: 8px;">Your gateway to seamless parking</p>
    </header>

    <main class="card auth-card">
        <div class="mb-4">
            <h2 style="font-size: 24px;">Welcome Back</h2>
            <p style="color: var(--text-dim); font-size: 14px;">Enter your credentials to access your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class='bx bx-envelope'></i>
                    <input id="email" type="email" placeholder="name@company.com" required>
                </div>
                <div class="error-msg" id="emailError" style="color: var(--error); font-size: 12px; display: none; margin-top: 4px;">
                    Please enter a valid email address
                </div>
            </div>

            <div class="form-group">
                <div class="flex-between mb-4" style="margin-bottom: 8px;">
                    <label for="password" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 12px; font-weight: 600;">Forgot password?</a>
                </div>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt'></i>
                    <input id="password" type="password" placeholder="••••••••" required>
                    <i class='bx bx-show' style="left: auto; right: 14px; cursor: pointer;" onclick="togglePassword()"></i>
                </div>
                <div class="error-msg" id="passError" style="color: var(--error); font-size: 12px; display: none; margin-top: 4px;">
                    Password must be at least 6 characters
                </div>
            </div>

            <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 10px;">
                Sign In <i class='bx bx-right-arrow-alt'></i>
            </button>
        </form>

        <div class="divider">OR CONTINUE WITH</div>

        <div class="social-grid">
            <button class="btn btn-secondary">
                <i class='bx bxl-google'></i> Google
            </button>
            <button class="btn btn-secondary">
                <i class='bx bxl-github'></i> Github
            </button>
        </div>
    </main>

    <div class="footer-text">
        Don't have an account? <a href="signup.html" style="font-weight: 700;">Create Account</a>
    </div>
</div>

<script>
    const form = document.getElementById("loginForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        
        let email = document.getElementById("email").value.trim();
        let password = document.getElementById("password").value;
        let valid = true;

        if (!email.includes("@")) {
            document.getElementById("emailError").style.display = "block";
            valid = false;
        } else {
            document.getElementById("emailError").style.display = "none";
        }

        if (password.length < 6) {
            document.getElementById("passError").style.display = "block";
            valid = false;
        } else {
            document.getElementById("passError").style.display = "none";
        }

        if (valid) {
            // Add a small loading state animation
            const btn = form.querySelector('button');
            btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Signing In...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        }
    });

    function togglePassword() {
        let pass = document.getElementById("password");
        let icon = event.target;
        if (pass.type === "password") {
            pass.type = "text";
            icon.classList.replace('bx-show', 'bx-hide');
        } else {
            pass.type = "password";
            icon.classList.replace('bx-hide', 'bx-show');
        }
    }
</script>

</body>
</html>
