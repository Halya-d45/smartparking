<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Reservation | Smart Parking</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #0f172a;
            margin: 0;
            padding: 0;
        }

        /* Abstract soft lighting */
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.8;
            z-index: 0;
            animation: pulse-light 6s infinite alternate;
        }
        
        .light-1 { width: 400px; height: 400px; background: rgba(14, 165, 233, 0.2); top: -100px; left: -100px; }
        .light-2 { width: 500px; height: 500px; background: rgba(99, 102, 241, 0.2); bottom: -150px; right: -150px; }

        @keyframes pulse-light {
            0% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Outer mobile container */
        .mobile-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            max-height: 850px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }
        
        @media (min-width: 500px) {
            .mobile-container {
                height: 90vh;
                border-radius: 40px;
                border: 8px solid #ffffff;
                box-shadow: 0 40px 80px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.8);
                background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 50%, #e2e8f0 100%);
                overflow: hidden;
            }
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-back, .btn-menu {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.05);
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-back:hover, .btn-menu:hover {
            background: #ffffff;
            color: #0ea5e9;
        }

        .page-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: #64748b;
            margin: 0;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }

        /* Glass Card */
        .glass-reservation-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05), inset 0 0 20px rgba(255,255,255,1);
            position: relative;
            flex: 1;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .reservation-status {
            color: #0284c7;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .pulse-dot-small {
            width: 8px; height: 8px; background: #0284c7; border-radius: 50%;
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.5);
            animation: pulse-dot 1s infinite alternate;
        }

        @keyframes pulse-dot {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.3); opacity: 1; }
        }

        /* Countdown */
        .countdown-timer {
            font-size: 56px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            color: #0f172a;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .timer-label {
            font-size: 15px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 30px;
        }
        
        /* Slot Info */
        .slot-info-box {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 16px 30px;
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .slot-id {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .slot-sub {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* AR View Container */
        .ar-view-container {
            width: 100%;
            flex: 1;
            min-height: 180px;
            background: #e2e8f0;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-image: url('https://images.unsplash.com/photo-1549721731-9f9392e27b40?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'); /* Fake AR backdrop */
            background-size: cover;
            background-position: center;
        }
        
        .ar-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ar-path {
            width: 60px;
            height: 160px;
            background: linear-gradient(to top, rgba(14, 165, 233, 0), rgba(14, 165, 233, 0.8));
            border-radius: 30px 30px 0 0;
            clip-path: polygon(50% 0%, 100% 30%, 80% 100%, 20% 100%, 0% 30%);
            animation: flow 1.5s infinite linear;
            position: relative;
        }

        @keyframes flow {
            from { background-position: 0 100px; transform: scaleY(0.9); }
            to { background-position: 0 0px; transform: scaleY(1.1); }
        }

        .ar-label {
            position: absolute;
            bottom: 12px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #0284c7;
            border: 1px solid rgba(14, 165, 233, 0.3);
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Glowing Orange Settle Up Button */
        .btn-settle-up {
            width: 100%;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 800;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3), 0 0 15px rgba(249, 115, 22, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-settle-up::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: all 0.5s;
        }

        .btn-settle-up:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(249, 115, 22, 0.4), 0 0 20px rgba(249, 115, 22, 0.4);
        }

        .btn-settle-up:hover::after {
            left: 100%;
        }

    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="mobile-container">
        
        <div class="header-bar">
            <button class="btn-back" onclick="window.history.back()"><i class="fas fa-chevron-left"></i></button>
            <h2 class="page-title">Active Session</h2>
            <button class="btn-menu"><i class="fas fa-ellipsis-v"></i></button>
        </div>

        <div class="glass-reservation-card">
            <div class="reservation-status">
                <div class="pulse-dot-small"></div>
                En Route
            </div>
            
            <div class="countdown-timer" id="timer">10:30</div>
            <div class="timer-label">Est. Arrival Time</div>

            <div class="slot-info-box">
                <div class="slot-id" id="slotIdDisplay">Slot A12</div>
                <div class="slot-sub">Level 1 • Premium EV</div>
            </div>

            <div class="ar-view-container">
                <div class="ar-overlay">
                    <div class="ar-path"></div>
                    <div class="ar-label"><i class="fas fa-camera"></i> AR Path Active</div>
                </div>
            </div>
        </div>

        <button class="btn-settle-up" onclick="alert('Proceeding to payment gateway processing...')">
            <span>Settle Up</span>
            <i class="fas fa-arrow-right"></i>
        </button>

    </div>

    <!-- Integrate logic just in case it is invoked from Select Slot -->
    <script>
        // Simple countdown logic for the aesthetic timer
        let minutes = 10;
        let seconds = 30;
        const timerDisplay = document.getElementById('timer');

        setInterval(() => {
            seconds--;
            if (seconds < 0) {
                seconds = 59;
                minutes--;
            }
            if(minutes < 0) {
                minutes = 0; seconds = 0;
            }
            
            const minStr = minutes.toString().padStart(2, '0');
            const secStr = seconds.toString().padStart(2, '0');
            timerDisplay.innerText = `${minStr}:${secStr}`;
        }, 1000);
        
        // Use local storage to pull actual slot if provided
        document.addEventListener("DOMContentLoaded", () => {
            const currentBooking = JSON.parse(localStorage.getItem("currentBooking"));
            if(currentBooking && currentBooking.slotId) {
                document.getElementById('slotIdDisplay').innerText = `Slot ${currentBooking.slotId}`;
            }
        });
    </script>
</body>
</html>
