<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="dashboard-page gradient-bg">

<nav class="navbar glass-card">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html" class="active">Map View</a>
        <a href="bookings.html">My Bookings</a>
        <a href="saved.html">Saved Slots</a>
        <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="app-container">
    <header class="dashboard-header animate-fade">
        <div class="welcome-text">
            <h1>Welcome back, <span id="userName">User</span></h1>
            <p>Ready to find your perfect parking spot?</p>
        </div>
        <div class="search-box glass-card">
            <i class="fas fa-search"></i>
            <input type="text" id="placeSearch" placeholder="Search for a location...">
            <button class="btn-premium" onclick="searchPlace()">Search</button>
        </div>
    </header>

    <main class="content-grid animate-fade">
        <div class="map-section glass-card">
            <div id="map"></div>
        </div>

        <aside class="quick-stats">
            <div class="glass-card stat-card">
                <i class="fas fa-calendar-check color-blue"></i>
                <div class="stat-info">
                    <h3 id="activeBookingsCount">0</h3>
                    <p>Active Bookings</p>
                </div>
            </div>
            <div class="glass-card stat-card">
                <i class="fas fa-bookmark color-cyan"></i>
                <div class="stat-info">
                    <h3>12</h3>
                    <p>Saved Places</p>
                </div>
            </div>
            <div class="glass-card parking-list-card">
                <h3>Nearby Parking</h3>
                <div id="parkingList" class="parking-list">
                    <p class="empty-state">Search an area to find slots...</p>
                </div>
            </div>
        </aside>
    </main>
</div>

<style>
/* Dashboard Specific Styles */
.dashboard-page {
    padding-bottom: 40px;
}
.navbar {
    margin: 0;
    border-radius: 0;
    padding: 12px 60px;
    height: 70px;
}
.nav-links {
    display: flex;
    align-items: center;
    gap: 24px;
}
.nav-links a {
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
}
.nav-links a.active {
    color: var(--accent-blue);
    font-weight: 700;
}
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 40px 0;
}
.search-box {
    display: flex;
    align-items: center;
    padding: 8px 8px 8px 20px;
    width: 100%;
    max-width: 500px;
    border-radius: 50px;
}
.search-box input {
    background: transparent;
    border: none;
    color: white;
    padding: 10px;
    width: 100%;
    outline: none;
}
.search-box i {
    color: var(--text-muted);
}
.content-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
    height: calc(100vh - 250px);
    min-height: 500px;
}
.map-section {
    padding: 0;
    overflow: hidden;
    height: 100%;
}
#map {
    width: 100%;
    height: 100%;
}
.quick-stats {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.stat-card {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px;
}
.stat-card i {
    font-size: 28px;
}
.color-blue { color: var(--accent-blue); }
.color-cyan { color: var(--accent-cyan); }

.parking-list-card {
    flex: 1;
    overflow-y: auto;
}
.parking-list-card h3 {
    margin-bottom: 16px;
    font-size: 16px;
}
.empty-state {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    margin-top: 40px;
}
.btn-sm {
    padding: 8px 16px;
    font-size: 12px;
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/script.js"></script>
<script>
    // Set user name and stats from localStorage/API
    const user = JSON.parse(localStorage.getItem("user"));
    const token = localStorage.getItem("token");

    if(!user || !token) {
        window.location.href = "login.html";
    } else {
        document.getElementById("userName").innerText = user.name;
        loadStats();
    }

    async function loadStats() {
        try {
            const res = await fetch(`${CONFIG.API_BASE}/booking?userId=${user.id}`);
            const bookings = await res.json();
            document.getElementById("activeBookingsCount").innerText = bookings.length;
        } catch (err) {
            console.error(err);
        }
    }
</script>
</body>
</html>
