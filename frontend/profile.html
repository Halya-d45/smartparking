<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="gradient-bg">

<nav class="navbar glass-card">
    <div class="logo" onclick="window.location.href='dashboard.html'" style="cursor:pointer">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html">Map View</a>
        <a href="bookings.html">My Bookings</a>
        <a href="saved.html">Saved Slots</a>
        <a href="profile.html" class="active"><i class="fas fa-user-circle"></i> Profile</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="app-container mt-4 animate-fade">
    <div class="profile-layout" style="display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        
        <div class="main-profile-content">
            <div class="glass-card" style="padding: 40px;">
                <div class="profile-header" style="display: flex; align-items: center; gap: 24px; margin-bottom: 40px;">
                    <div class="profile-avatar" style="width: 80px; height: 80px; background: rgba(59, 130, 246, 0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--accent-blue); border: 1px solid var(--line-active);">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div>
                        <h2 class="gradient-text" style="font-size: 28px; font-weight: 800;" id="pNameHeader">Account Holder</h2>
                        <p style="color: var(--text-muted); font-size: 14px;">Enterprise SaaS Member</p>
                    </div>
                </div>

                <div class="profile-details-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="detail-item" style="padding: 20px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--line-soft);">
                        <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Full Name</span>
                        <span id="pName" style="font-size: 16px; font-weight: 600;">-</span>
                    </div>
                    <div class="detail-item" style="padding: 20px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--line-soft);">
                        <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Email Address</span>
                        <span id="pEmail" style="font-size: 16px; font-weight: 600;">-</span>
                    </div>
                    <div class="detail-item" style="grid-column: 1 / -1; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--line-soft);">
                        <span style="display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">System Account ID</span>
                        <span id="pRole" style="font-size: 14px; font-weight: 500; font-family: monospace; color: var(--accent-cyan);">-</span>
                    </div>
                </div>

                <button class="btn-premium w-100 mt-4" style="height: 54px;" onclick="alert('Profile secure editing is coming soon!')">
                    <i class="fas fa-shield-halved"></i> Update Account Security
                </button>
            </div>
        </div>

        <aside class="profile-stats-sidebar">
            <div class="glass-card stat-card mb-4">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-details">
                    <h2 id="activeBookingsCount">0</h2>
                    <p>Active Bookings</p>
                </div>
            </div>
            
            <div class="glass-card stat-card">
                <div class="stat-icon" style="color: var(--accent-cyan); background: rgba(34, 211, 238, 0.1); border-color: rgba(34, 211, 238, 0.2);">
                    <i class="fas fa-bookmark"></i>
                </div>
                <div class="stat-details">
                    <h2 id="savedPlacesCount">0</h2>
                    <p>Saved Places</p>
                </div>
            </div>

            <div class="glass-card mt-4" style="padding: 24px; text-align: center;">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">Quick access to your activity logs</p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn-premium btn-sm" style="background: var(--bg-muted);" onclick="window.location.href='bookings.html'">View All Bookings</button>
                    <button class="btn-premium btn-sm" style="background: var(--bg-muted);" onclick="window.location.href='saved.html'">Manage Saved Slots</button>
                </div>
            </div>
        </aside>

    </div>
</div>

<style>
.profile-stats-sidebar .stat-card {
    padding: 20px;
}
</style>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem("user"));
    if(user) {
        document.getElementById("pNameHeader").innerText = user.name;
        document.getElementById("pName").innerText = user.name;
        document.getElementById("pEmail").innerText = user.email;
        document.getElementById("pRole").innerText = user.id;
        loadStats();
    } else {
        window.location.href = "login.html";
    }

    async function loadStats() {
        try {
            const token = localStorage.getItem("token");
            let localSavedCount = JSON.parse(localStorage.getItem("guest_saved") || "[]").length;
            
            if (!token) {
                document.getElementById("savedPlacesCount").innerText = localSavedCount;
                return;
            }

            const res = await fetch(`${CONFIG.API_BASE}/saved/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stats = await res.json();
            
            // Combine API and local for "Real" feel
            const apiSaved = stats.savedPlaces || 0;
            const apiBookings = stats.activeBookings || 0;
            
            // For saved places, we take the larger of the two or combine if needed
            // But usually, local count is more immediate
            document.getElementById("activeBookingsCount").innerText = apiBookings;
            document.getElementById("savedPlacesCount").innerText = Math.max(apiSaved, localSavedCount);
            
            console.log("Stats loaded:", { apiBookings, apiSaved, localSavedCount });
        } catch (err) {
            console.error("Stats Error:", err);
            // Fallback to local only on error
            let localSavedCount = JSON.parse(localStorage.getItem("guest_saved") || "[]").length;
            document.getElementById("savedPlacesCount").innerText = localSavedCount;
        }
    }
</script>
</body>
</html>
