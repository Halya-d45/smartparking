<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Slots | Smart Parking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-page gradient-bg">

<nav class="navbar glass-card">
    <div class="logo" onclick="window.location.href='dashboard.html'" style="cursor:pointer">
        <div class="logo-icon"><i class="fas fa-parking"></i></div>
        <span class="gradient-text">Smart Parking</span>
    </div>
    <div class="nav-links">
        <a href="dashboard.html">Map View</a>
        <a href="bookings.html">My Bookings</a>
        <a href="saved.html" class="active">Saved Slots</a>
        <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
        <button class="btn-premium btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="app-container">
    <header class="dashboard-header animate-fade">
        <div class="welcome-text">
            <h1>Your <span class="gradient-text">Saved Places</span></h1>
            <p>Quick access to your most used parking spots.</p>
        </div>
    </header>

    <main class="saved-grid animate-fade" id="savedContainer">
        <div class="loader">Loading your favorites...</div>
    </main>
</div>

<style>
.saved-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    margin-top: 20px;
}
.navbar {
    margin: 0;
    border-radius: 0;
    padding: 12px 60px;
}
.dashboard-header {
    margin: 40px 0;
}
</style>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    async function loadSaved() {
        const container = document.getElementById("savedContainer");
        const token = localStorage.getItem("token");
        
        try {
            const res = await fetch(`${CONFIG.API_BASE}/saved`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="glass-card empty-state-container w-100" style="grid-column: 1/-1; padding: 60px; text-align: center;">
                        <i class="fas fa-bookmark" style="font-size: 48px; color: var(--text-muted); margin-bottom: 20px;"></i>
                        <h3>No Saved Places Yet</h3>
                        <p>Search for parking on the Map and click the heart icon to save it here.</p>
                        <button class="btn-premium mt-4" onclick="window.location.href='dashboard.html'">Go to Map</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = "";
            data.forEach(p => {
                const card = document.createElement("div");
                card.className = "glass-card parking-item animate-fade";
                card.innerHTML = `
                    <div class="parking-info">
                        <div class="item-header">
                            <h4>${p.name}</h4>
                            <button class="save-btn active" onclick="removeSaved('${p.parkingId}', this)">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <p><i class="fas fa-map-marker-alt"></i> ${p.location}</p>
                        <div class="parking-meta">
                            <span class="slots-count">Lat: ${p.latitude.toFixed(4)}, Lon: ${p.longitude.toFixed(4)}</span>
                        </div>
                        <button class="btn-premium btn-sm w-100 mt-2" onclick="window.location.href='parking-details.html?id=${p.parkingId}'">Book Now</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            container.innerHTML = "<p>Error loading saved places.</p>";
        }
    }

    async function removeSaved(id, btn) {
        const token = localStorage.getItem("token");
        try {
            await fetch(`${CONFIG.API_BASE}/saved/toggle`, {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ parkingId: id })
            });
            btn.closest(".parking-item").classList.add("fade-out");
            setTimeout(loadSaved, 300);
        } catch (err) {
            console.error(err);
        }
    }

    loadSaved();
</script>
</body>
</html>
