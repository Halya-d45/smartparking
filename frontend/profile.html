<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | Smart Parking Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: { light: "#f8fafc", dark: "#0f172a" },
                        primary: "#3b82f6"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #dashboard-3d-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; opacity: 0.15; pointer-events: none; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-white dark:bg-[#0f172a] min-h-screen text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="dashboard-3d-bg"></div>

    <!-- Premium Top Navigation -->
    <nav class="fixed top-0 left-0 right-0 h-24 bg-white/60 dark:bg-slate-900/60 backdrop-blur-2xl border-b border-black/5 dark:border-white/5 z-[60] transition-all duration-300">
        <div class="max-w-[1700px] mx-auto h-full px-8 flex items-center justify-between">
            <div class="flex items-center space-x-12">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-600/30">
                        <i class="fas fa-parking text-white text-xl"></i>
                    </div>
                    <div class="hidden sm:block">
                        <h1 class="text-xl font-black text-slate-800 dark:text-white leading-tight">SmartPark</h1>
                        <p class="text-[10px] uppercase tracking-[0.2em] font-extrabold text-blue-500">Premium</p>
                    </div>
                </div>

                <div class="hidden lg:flex items-center space-x-2 bg-gray-100/50 dark:bg-white/5 p-1.5 rounded-2xl border border-black/5 dark:border-white/5">
                    <button onclick="location.href='dashboard.html'" class="px-6 py-3 rounded-xl transition-all hover:bg-white dark:hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-map-location-dot"></i> <span class="font-bold text-sm">Explore</span>
                    </button>
                    <button onclick="location.href='bookings.html'" class="px-6 py-3 rounded-xl transition-all hover:bg-white dark:hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-calendar-check"></i> <span class="font-bold text-sm">Bookings</span>
                    </button>
                    <button onclick="location.href='saved.html'" class="px-6 py-3 rounded-xl transition-all hover:bg-white dark:hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-bookmark"></i> <span class="font-bold text-sm">Saved</span>
                    </button>
                    <button onclick="location.href='wallet.html'" class="px-6 py-3 rounded-xl transition-all hover:bg-white dark:hover:bg-white/10 flex items-center gap-3">
                        <i class="fas fa-wallet"></i> <span class="font-bold text-sm">Wallet</span>
                    </button>
                    <button onclick="location.href='profile.html'" class="px-6 py-3 rounded-xl transition-all bg-blue-600 text-white shadow-xl shadow-blue-500/20 flex items-center gap-3">
                        <i class="fas fa-user-circle"></i> <span class="font-bold text-sm">Profile</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center space-x-6">
                <button id="themeToggle" class="w-12 h-12 flex items-center justify-center bg-gray-100 dark:bg-white/5 rounded-2xl text-slate-400 font-bold transition-all hover:text-blue-500">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
                <button onclick="logout()" class="text-xs font-black uppercase text-red-500 bg-red-50 dark:bg-red-500/10 px-4 py-2.5 rounded-xl hover:bg-red-500 hover:text-white transition-all">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1200px] mx-auto pt-40 px-8 relative z-10 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <!-- Left: Avatar Card -->
            <div class="lg:col-span-1">
                <div class="glass-card p-10 rounded-[3rem] text-center shadow-2xl relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-600/5 to-transparent"></div>
                    <div class="w-32 h-32 rounded-[2.5rem] bg-blue-600 mx-auto mb-8 flex items-center justify-center text-5xl text-white shadow-2xl shadow-blue-500/30 font-black relative z-10" id="profile-initials">AJ</div>
                    <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tighter mb-2" id="profile-name">Alex Johnson</h2>
                    <p class="text-gray-400 font-black uppercase text-[10px] tracking-widest mb-8" id="profile-role">Premium Member</p>
                    
                    <div class="space-y-3 pt-6 border-t border-black/5 dark:border-white/5 relative z-10">
                        <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-white/5 rounded-2xl">
                            <span class="text-xs font-bold text-gray-400">Total Bookings</span>
                            <span class="text-sm font-black text-slate-800 dark:text-white" id="stat-bookings">--</span>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-white/5 rounded-2xl">
                            <span class="text-xs font-bold text-gray-400">Account Safety</span>
                            <span class="text-xs font-black text-emerald-500">Verified Hub</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Settings Form -->
            <div class="lg:col-span-2 space-y-8">
                <div class="glass-card p-10 rounded-[3rem]">
                    <h3 class="text-2xl font-black text-slate-800 dark:text-white mb-2 tracking-tighter">Profile <span class="text-blue-600">Settings</span></h3>
                    <p class="text-gray-400 font-bold text-sm mb-10">Update your personal information and contact details.</p>
                    
                    <form id="edit-profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Full Name</label>
                            <input type="text" id="edit-name" class="w-full bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 p-5 rounded-3xl outline-none focus:border-blue-500 transition-all font-bold placeholder:text-gray-300 dark:placeholder:text-gray-600">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Email Address</label>
                            <input type="email" id="edit-email" class="w-full bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 p-5 rounded-3xl outline-none focus:border-blue-500 transition-all font-bold placeholder:text-gray-300 dark:placeholder:text-gray-600">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Phone Number</label>
                            <input type="text" id="edit-phone" class="w-full bg-gray-50 dark:bg-white/5 border border-gray-100 dark:border-white/10 p-5 rounded-3xl outline-none focus:border-blue-500 transition-all font-bold placeholder:text-gray-300 dark:placeholder:text-gray-600">
                        </div>
                        <div class="md:col-span-2 pt-4">
                            <button type="submit" class="w-full py-5 bg-blue-600 text-white rounded-3xl font-black uppercase text-xs tracking-widest hover:bg-blue-700 transition-all shadow-2xl shadow-blue-500/30 active:scale-[0.98]">Save Changes Across Platform</button>
                        </div>
                    </form>
                </div>

                <div class="glass-card p-10 rounded-[3rem] border-dashed border-2 border-red-100 dark:border-red-900/30 flex items-center justify-between">
                    <div>
                        <h4 class="text-lg font-black text-red-500 tracking-tight">Danger Zone</h4>
                        <p class="text-xs font-bold text-gray-400">Permanently delete your account and history.</p>
                    </div>
                    <button class="px-8 py-3 bg-red-50 dark:bg-red-500/10 text-red-500 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">Delete Account</button>
                </div>
            </div>

        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/three-bg.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));

        function initProfile() {
            if (!user) return;
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-initials').innerText = (user.name.substring(0, 2) || "US").toUpperCase();
            document.getElementById('edit-name').value = user.name || "";
            document.getElementById('edit-email').value = user.email || "";
            document.getElementById('edit-phone').value = user.phone || "";
            
            // Stats Sync
            const token = localStorage.getItem("token");
            fetch(`${CONFIG.API_BASE}/booking?userId=${user.id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(r => r.json()).then(data => {
                document.getElementById('stat-bookings').innerText = data.length || "0";
            });
        }

        document.getElementById('edit-profile-form').onsubmit = (e) => {
            e.preventDefault();
            const updated = {
                ...user,
                name: document.getElementById('edit-name').value,
                email: document.getElementById('edit-email').value,
                phone: document.getElementById('edit-phone').value
            };
            localStorage.setItem('user', JSON.stringify(updated));
            alert("Changes saved locally! Real-time sync achieved.");
            location.reload();
        }

        // Theme Linkage
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        initProfile();
    </script>
</body>
</html>
