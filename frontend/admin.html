<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Smart Parking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen">
    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 bottom-0 w-64 bg-slate-900 text-white p-6 z-50">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-parking"></i>
            </div>
            <h1 class="font-extrabold text-lg tracking-tighter">AdminPortal</h1>
        </div>

        <nav class="space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-xl font-bold text-sm">
                <i class="fas fa-chart-line"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-parking"></i> Manage Hubs
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-users"></i> User Management
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white transition-all font-bold text-sm">
                <i class="fas fa-file-invoice-dollar"></i> Revenue
            </a>
        </nav>

        <div class="absolute bottom-10 left-6 right-6">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 bg-red-500/10 text-red-500 rounded-xl font-bold text-sm hover:bg-red-500/20 transition-all">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 p-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black text-slate-900 mb-1">System Overview</h2>
                <p class="text-gray-500 font-bold">Manage global parking infrastructure and user activity.</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-sm font-black text-slate-900" id="admin-name">Admin User</p>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Master Access</p>
                </div>
                <div class="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center border border-slate-200">
                    <i class="fas fa-user-shield text-slate-400"></i>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="fas fa-parking"></i>
                </div>
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-1">Total Hubs</p>
                <h4 class="text-2xl font-black text-slate-900">2,000</h4>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="fas fa-users"></i>
                </div>
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-1">Active Users</p>
                <h4 class="text-2xl font-black text-slate-900">842</h4>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-orange-50 text-orange-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-1">New Bookings</p>
                <h4 class="text-2xl font-black text-slate-900">128</h4>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-4">
                    <i class="fas fa-wallet"></i>
                </div>
                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-1">Today's Revenue</p>
                <h4 class="text-2xl font-black text-slate-900">$2,410</h4>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-10 border border-slate-100 shadow-sm">
             <div class="flex items-center justify-between mb-8">
                 <h3 class="text-xl font-black text-slate-900">Recent System Logs</h3>
                 <button class="px-4 py-2 border border-slate-200 rounded-xl text-xs font-bold hover:bg-slate-50 transition-all">View All</button>
             </div>
             <div class="text-center py-20 text-gray-300 font-bold italic">
                 Log synchronization in progress...
             </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('admin-name').innerText = user.name;
        }
    </script>
</body>
</html>
